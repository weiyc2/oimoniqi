<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OI生涯模拟器</title>
    <style>
        :root {
            --bg: #0a0f1a; --panel: #111d2b; --border: #2c3e50; --text: #c8d6e5;
            --gold: #f1c40f; --blue: #3498db; --green: #2ecc71; --orange: #e67e22;
            --purple: #9b59b6; --teal: #1abc9c; --red: #e74c3c;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg); font-family: system-ui, monospace;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            padding: 12px; color: var(--text);
            background-image: radial-gradient(ellipse at 20% 20%, #1a2f40 0%, #0a0f1a 80%);
        }
        #game-container {
            width: 100%; max-width: 860px; background: var(--panel);
            border: 2px solid var(--border); border-radius: 20px; padding: 18px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7); display: flex;
            flex-direction: column; gap: 14px; position: relative; min-height: 90vh;
        }
        #title-area { text-align:center; font-size:1.9rem; font-weight:700; color:var(--gold); border-bottom:1px dashed var(--border); padding-bottom:8px; }
        .volume-panel {
            position: absolute; top: 10px; right: 10px; display: flex; align-items: center;
            gap: 6px; font-size: 0.75rem; color: #95a5a6; z-index: 20;
        }
        .volume-panel input { width: 70px; }
        .mute-btn { background:none; border:1px solid var(--border); color:var(--text); font-size:1.1rem; cursor:pointer; padding:2px 8px; border-radius:8px; }
        .mute-btn.muted { color:var(--red); border-color:var(--red); }
        .year-badge {
            position: absolute; top: 38px; right: 10px; background: var(--gold); color: #0a0f1a;
            font-weight: bold; padding: 2px 10px; border-radius: 12px; font-size: 0.75rem; z-index: 10;
        }
        .stats-panel { display:flex; flex-wrap:wrap; gap:10px; background:#162433; padding:14px; border-radius:14px; font-size:0.8rem; }
        .stat-item { flex:1; min-width:70px; }
        .stat-bar-bg { background:#2c3e50; height:6px; border-radius:10px; overflow:hidden; margin:2px 0; }
        .stat-bar-fill { height:100%; border-radius:10px; transition:width 0.4s; }
        .code-fill { background:var(--green); } .mood-fill { background:var(--orange); } .know-fill { background:var(--purple); } .social-fill { background:var(--teal); }
        #scene-content { background:#1a2e40; border-radius:14px; padding:18px; min-height:160px; line-height:1.6; white-space:pre-wrap; overflow-y:auto; }
        .choices-container { display:flex; flex-direction:column; gap:8px; }
        .choice-btn { background:#233b4a; border:none; color:#f0f4f8; padding:12px 16px; border-radius:12px; font-family:inherit; font-size:0.9rem; cursor:pointer; text-align:left; border-left:5px solid var(--blue); width:100%; }
        .choice-btn:hover { background:#2f4d62; border-left-color:var(--gold); }
        .choice-btn:disabled { opacity:0.6; }
        #log-panel { background:#0c1a24; border-radius:8px; padding:8px; max-height:80px; overflow-y:auto; font-size:0.7rem; display:flex; flex-direction:column; gap:4px; }
        .log-entry { padding:2px 6px; background:#162433; }
        .log-entry.gain { color:#2ecc71; } .log-entry.loss { color:#e74c3c; }
        .float-text { position:fixed; top:30%; left:50%; transform:translate(-50%,-50%); font-size:2.5rem; font-weight:bold; color:var(--gold); z-index:999; pointer-events:none; animation:floatUp 2s ease-out forwards; }
        @keyframes floatUp { 0%{opacity:1;top:30%;} 100%{opacity:0;top:10%;} }
        .tab-container { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px; }
        .tab { background:#2c3e50; padding:6px 12px; border-radius:8px 8px 0 0; cursor:pointer; font-weight:bold; color:#b0c4de; font-size:0.7rem; }
        .tab.active { background:var(--gold); color:#0a0f1a; }
        .notebook {
            background: #fef9e7; color: #2c3e50; padding:18px; border-radius:12px;
            font-family: cursive; line-height: 2;
            background-image: linear-gradient(#e0d7c0 1px, transparent 1px);
            background-size: 100% 2em;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }
        .progress-bar { width:100%; height:8px; background:#2c3e50; border-radius:4px; margin:8px 0; overflow:hidden; }
        .progress-fill { height:100%; background:var(--gold); transition:width 0.3s; }
        .diff-dot { display:inline-block; width:12px; height:12px; border-radius:50%; margin-right:6px; vertical-align:middle; box-shadow:0 0 6px currentColor; }
        .diff-easy { background:#2ecc71; } .diff-normal { background:#f1c40f; } .diff-hard { background:#e67e22; } .diff-hell { background:#e74c3c; }
        .icon-green { color: #2ecc71; font-weight:bold; }
        .icon-yellow { color: #f1c40f; font-weight:bold; }
        .icon-red { color: #e74c3c; font-weight:bold; }
        .icon-purple { color: #9b59b6; font-weight:bold; }
        .icon-gold { color: #f1c40f; font-weight:bold; }
        .icon-teal { color: #1abc9c; font-weight:bold; }
        .icon-orange { color: #e67e22; font-weight:bold; }
        .icon-blue { color: #3498db; font-weight:bold; }
    </style>
</head>
<body>
<div id="game-container">
    <div id="title-area">🏆 OI生涯模拟器</div>
    <div class="volume-panel">
        <span>🔊</span>
        <input type="range" min="0" max="0.15" step="0.01" value="0.07" id="volSlider">
        <span id="volVal">7%</span>
        <button class="mute-btn" id="mute-btn" title="静音/取消静音">🔊</button>
    </div>
    <span id="year-badge" class="year-badge">高一·上学期</span>
    <div id="stats-panel" class="stats-panel"></div>
    <div id="scene-content"></div>
    <div id="choices-container" class="choices-container"></div>
    <div id="log-panel"></div>
</div>

<script>
(function() {
// ===== 图标 =====
var ICON = {

    yellow: '<span class="icon-yellow">●</span>',
    red: '<span class="icon-red">●</span>',

    trainRetire: '<span class="icon-orange">📝</span>',
    trainDiary: '<span class="icon-gold">📖</span>',
    eventStudy: '<span class="icon-teal">📚</span>',
    eventDeep: '<span class="icon-purple">🔬</span>',
    eventSocial: '<span class="icon-yellow">🤝</span>',
    eventSleep: '<span class="icon-blue">🌙</span>',

    contestCTS: '<span class="icon-red">🔴</span>',
    contestIOI: '<span class="icon-purple">🟣</span>',

    diffHard: '<span class="icon-orange">●</span>',
    diffHell: '<span class="icon-red">●</span>',
};

// ===== 教程（完整）=====
var tutorialTexts = [
    "欢迎来到OI生涯模拟器！你将扮演一名高一新生，在三年时光里完整经历" + ICON.contestCSP + "CSP-S、" + ICON.contestNOIP + "NOIP、" + ICON.contestProv + "省选、" + ICON.contestNOI + "NOI、" + ICON.contestCTT + "CTT、" + ICON.contestWC + "WC冬令营、" + ICON.contestCTS + "CTS选拔，直至" + ICON.contestIOI + "IOI。游戏的核心是管理四项属性——代码力、心态、知识、社交——在比赛之间的有限训练中提升自己，在每一场比赛中利用卡牌策略争取最好的成绩。比赛失利并不意味着结束，你可以选择\"明年再战\"继续成长。你可以从简单、普通、困难、地狱四种难度中选择，难度会影响分数线、得分倍率、事件概率等几乎所有方面。越高级的比赛（NOI/CTT/CTS/IOI）难度会显著提升，对手也会更强。",
    "游戏开始时，你可以从四位性格鲜明的主角中选择一位，每位都有独特的能力与弱点：\n\n1. 陈墨·退役边缘人：去年普及组爆零，背负着阴影重新开始。当心态彻底崩溃时，会触发\"最后一舞\"，3回合内所有代码力消耗减半，但初始心态只有60。看退役记对他来说是力量的源泉，心态+8。\n\n2. 林思远·天赋怪：初中被称为天才，上了高中却开始失眠。所有比赛得分自动+20%，但队友交卷时心态会额外降低。\n\n3. 张浩·刷题机器：刷了三千题，代码力上限提升至150，初始100，但\"读错题\"的概率翻倍。\n\n4. 苏晓雨·女队独苗：全省唯一进复赛的女生。心态低于30时会自动回复20点（每场比赛仅一次），每场比赛初始分数-10，专属事件可触发下题得分+15%。",
    "四个属性条贯穿整个游戏：\n\n💻代码力：你的编码硬实力。比赛时许多卡牌会消耗它，归零则比赛强制结束。训练和休息可恢复。低于30时每回合可选卡牌会减少。\n\n🧠心态：心理状态。高于70时得分×1.05，低于30时×0.85。归零将导致当场崩溃退赛。\n\n📚知识：算法功底。直接影响正解思路的分数，知识≥70时将解锁\"巧解思路\"卡牌，消耗更少且得分更高。\n\n🤝社交：与队友和教练的关系。社交>60时每回合可选卡牌从3张变为4张；社交>70时，队友纸条事件一定是好消息；社交>50时，训练负面事件效果减半；社交越高，训练中获得道具的概率越大。",
    "每次比赛前有训练环节。CSP-S之前有5次训练机会，此后每场比赛前3次。CTT三场比赛之间各有一次训练，CTS两场比赛之间也有一次训练。此外还有特殊的\"WC冬令营\"训练阶段（5次训练），提供专属事件和质量评分。训练选项包括：\n\n· " + ICON.trainStudy + "刷题巩固：知识+6 代码力+3 心态-1\n· " + ICON.trainDeep + "钻研算法：知识+10 心态-2\n· " + ICON.trainSport + "运动放松：心态+5 代码力+3\n· " + ICON.trainSocial + "与同学交流：社交+8 知识+4 心态+1\n· " + ICON.trainSleep + "保证睡眠：代码力+5 心态+2（连续超2次减半）\n· " + ICON.trainRetire + "看退役记：陈墨心态+8；其他人知识+3 代码力+3 心态-3\n· " + ICON.trainDiary + "查看训练日记：随时回顾全部训练记录\n\n训练数值已平衡，高属性会收益递减。",
    "道具是关键时刻的救命稻草。你最多可携带4种不同的道具，可以在比赛开始前主动选择使用：\n\n· 免死金牌：回复20点心态\n· 咖啡：回复25点代码力\n· 小抄：立即获得30分\n· 幸运符：立即获得15分\n\n道具在训练中概率掉落（基础20% + 社交×0.2% + 难度修正）。地狱难度初始赠送一件免死金牌，每年结束时若获得过荣誉，还可随机获得补偿道具。比赛过程中，当代码力或心态极低时，会自动使用对应道具。",
    "每年你将依次参加以下比赛（晋级难度逐级递增）：\n" + ICON.contestCSP + "CSP-S（4题·入门）→ " + ICON.contestNOIP + "NOIP（4题·入门）→ " + ICON.contestProv + "省选Day1+Day2（各3题·进阶，加权总分=NOIP×35%+省选×65%）→ " + ICON.contestNOI + "NOI Day1+Day2（各3题·困难，A类+5分）→ " + ICON.contestCTT + "CTT选拔Day1→训练→Day2→训练→Day3（各3题·困难，三场总分决定进入WC）→ " + ICON.contestWC + "WC冬令营（5次训练，质量评分）→ " + ICON.contestCTS + "CTS选拔Day1→训练→Day2（各3题·极限，加权总分决定国家队）→ " + ICON.contestIOI + "IOI Day1+Day2（各3题·极限）。\n\n每道题包含3个回合：思路与实现、编码与构造、调试与提交。每回合你会从随机卡牌中选择一张打出。比赛过程中如果代码力或心态归零，比赛提前结束，但已得分会保留并正常判定晋级。\n\n越高级的比赛，基础得分越低、消耗越高、对手越强。每场比赛开始前，你还可以选择本场策略：稳扎稳打（稳健卡牌得分+15%）、放手一搏（高风险卡牌得分+20%）、心态调整（跳题回复额外+5心态），系统会基于属性给出推荐。",
    "每回合你会从随机卡牌中选择一张：\n\n· " + ICON.green + "绿色卡牌（稳健）：稳定得分，消耗适中。如暴力思路、稳健实现。\n· " + ICON.yellow + "黄色卡牌（风险）：高分高消耗，可能失败。如正解思路、快速编码。\n· " + ICON.red + "红色卡牌（事故）：负面效果，如读错题、段错误（知识≥60时损失减半）。\n· " + ICON.purple + "巧解思路：知识≥70时解锁，消耗更低得分更高。\n· " + ICON.gold + "传说灵感：不同身份有不同触发条件，提供大幅得分且无消耗。\n\n心态和知识影响基础得分。每题上限100分，不会溢出。社交>60时每回合可选卡牌+1。比赛画面顶部有进度条显示当前进度。",
    "比赛中会频繁出现随机事件，考验你的临场决策：手机震动是否偷看、草稿纸用完、监考老师站身后、空格键卡住（可举手求助跳过下回合）、旁边人代码全红、教练门口比手势、突然肚子疼、撞原题直接加分、停电跳过1回合、旁边坐着省队选手、评测系统公告、时间看错、队友扔纸团（社交影响好坏）、心理崩溃边缘、灵感爆发、队友提前交卷（天赋怪额外扣心态）。每个角色还有专属事件。固定回合（第4、7、8、11及最后一题）有特殊剧情，社交高可解锁更好选项。事件收益与惩罚随难度等级变化。",
    "每场比赛结束后的晋级判定：\n· CSP-S：得分>0即可进入NOIP\n· NOIP：达到省选线\n· 省选：NOIP×35%+省选×65%的加权总分决定省队分队，A类NOI总分+5分\n· NOI：总分划分金银铜牌，金牌进CTT\n· CTT：三场总分达到集训队选拔线，进入WC冬令营\n· WC冬令营：5次训练累积质量分，转化为平时成绩（质量分×10，满分100）\n· CTS：加权总分 = CTT总分×54% + CTS总分×36% + 平时成绩×10%，达到国家队线则入选\n· IOI：结束后游戏结束，展示最终评价\n\n特殊规则：高二时若任意比赛失败，游戏会立即结束并显示原因（精英路线除外）。进入高三的唯一途径是高二NOI金牌且通过CTT选拔；若高一即通过CTT，则高二直接进入精英路线（正常参加CSP-S/NOIP/省选/NOI，但失败不影响生存）。高三赛季中，CSP‑S和NOIP为纯参与，之后进行WC冬令营、CTS和IOI，失败即结束。结局展示最终属性、奖项、隐藏成就、生涯数据、历届NOI成绩以及对手回忆。",
    "游戏全程通过点击选项按钮进行。你可以随时悬停在属性条上查看详细说明。屏幕底部的日志区域会记录最近发生的重要事件，并用不同颜色区分正负面。祝你享受这段旅程！"
];

// ===== 音效 =====
var audioCtx = null, muted = false, volume = 0.07;
function getCtx() { if (!audioCtx) try { audioCtx = new (window.AudioContext||window.webkitAudioContext)(); } catch(e) {} if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); return audioCtx; }
function playTone(f,d,t,v) { if (muted) return; try { t=t||'sine'; v=v||volume; var c=getCtx(); if(!c)return; var o=c.createOscillator(), g=c.createGain(); o.type=t; o.frequency.setValueAtTime(f,c.currentTime); g.gain.setValueAtTime(v,c.currentTime); g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d); o.connect(g); g.connect(c.destination); o.start(); o.stop(c.currentTime+d); } catch(e) {} }
function initVolume() {
    var slider = document.getElementById('volSlider'), valSpan = document.getElementById('volVal'), muteBtn = document.getElementById('mute-btn');
    slider.addEventListener('input', function(e) { volume = parseFloat(e.target.value); valSpan.textContent = Math.round(volume * 100) + '%'; });
    muteBtn.addEventListener('click', function() { muted = !muted; this.textContent = muted ? '🔇' : '🔊'; this.classList.toggle('muted', muted); });
}

// ===== 难度 =====
var DIFFICULTIES = {
    'easy':   { name:'简单', lineMul:1.05, scoreMul:0.88, bugAdd:0.02, duipaiAdd:0.02, eventProb:0.35, trainNegProb:0.45, itemBonus:-0.08, costMul:1.08, trainGainMul:0.88, itemEffectMul:0.94, expMul:0.88 },
    'normal': { name:'普通', lineMul:1.12, scoreMul:0.78, bugAdd:0.06, duipaiAdd:-0.04, eventProb:0.42, trainNegProb:0.57, itemBonus:-0.05, costMul:1.12, trainGainMul:0.78, itemEffectMul:0.88, expMul:0.78 },
    'hard':   { name:'困难', lineMul:1.2,  scoreMul:0.65, bugAdd:0.1, duipaiAdd:-0.08, eventProb:0.48, trainNegProb:0.72, itemBonus:-0.15, costMul:1.2, trainGainMul:0.7, itemEffectMul:0.8, expMul:0.7 },
    'hell':   { name:'地狱', lineMul:1.35, scoreMul:0.5, bugAdd:0.15, duipaiAdd:-0.15, eventProb:0.55, trainNegProb:0.85, itemBonus:-0.2, costMul:1.3, trainGainMul:0.6, itemEffectMul:0.7, expMul:0.6 }
};
function getDiff() { return DIFFICULTIES[G.flags.difficulty] || DIFFICULTIES.normal; }
function getContestTier(name) { if (name.indexOf('CSP-S')!==-1) return 1; if (name.indexOf('NOIP')!==-1) return 2; if (name.indexOf('省选')!==-1) return 3; if (name.indexOf('NOI')!==-1) return 4; if (name.indexOf('CTT')!==-1) return 5; if (name.indexOf('CTS')!==-1) return 6; if (name.indexOf('IOI')!==-1) return 7; return 1; }
function getTierLabel(tier) { return ['入门','入门','进阶','进阶','困难','困难','极限','极限'][tier] || '入门'; }
function getTierScoreMul(tier) { return Math.max(0.45, 1 - (tier-1)*0.07); }
function getTierCostMul(tier) { return 1 + (tier-1)*0.06; }

function applyDiminishing(stat, delta) {
    if (delta <= 0) return delta;
    if (stat === '知识' && G.player.知识 > 70) return Math.floor(delta * 0.5);
    if (stat === '社交' && G.player.社交 > 70) return Math.floor(delta * 0.5);
    return delta;
}

function calcActualTrainDelta(stat, baseDelta) {
    var delta = baseDelta;
    if (delta > 0 && (G.flags.stage === 'training' || G.flags.stage === 'prep')) {
        delta = Math.max(1, Math.floor(delta * (getDiff().trainGainMul||1)));
    } else if (delta < 0 && (G.flags.stage === 'training' || G.flags.stage === 'prep')) {
        if (G.player.社交 > 50) delta = Math.ceil(delta / 2);
    }
    if (G.flags.stage === 'training' || G.flags.stage === 'prep') {
        delta = applyDiminishing(stat, delta);
    }
    return delta;
}

function updStat(stat, delta) {
    if (delta > 0 && (G.flags.stage === 'training' || G.flags.stage === 'prep')) delta = Math.max(1, Math.floor(delta * (getDiff().trainGainMul||1)));
    else if (delta < 0 && (G.flags.stage === 'training' || G.flags.stage === 'prep')) { if (G.player.社交 > 50) delta = Math.ceil(delta/2); }
    if (G.flags.stage === 'training' || G.flags.stage === 'prep') {
        delta = applyDiminishing(stat, delta);
    }
    var mx = (stat === '代码力' && G.flags.identity && G.flags.identity.sp === 'code_cap') ? 150 : 100;
    G.player[stat] = clamp(G.player[stat] + delta, 0, mx);
    if (stat === '心态') { if (G.player.心态 < G.flags.lowestMood) G.flags.lowestMood = G.player.心态; if (G.player.心态 < G.flags.hiddenFlags.darkestMood) G.flags.hiddenFlags.darkestMood = G.player.心态; }
    if (stat === '社交') { if (G.player.社交 > 80) G.flags.hiddenFlags.社交高 = true; if (G.player.社交 < 40) G.flags.hiddenFlags.社交低 = true; }
    if (stat === '心态' && G.player.心态 <= 0 && G.flags.identity && G.flags.identity.sp === 'last_dance' && !G.flags.lastDanceTriggered && G.flags.stage === 'contest') {
        G.flags.lastDanceTriggered = true; G.flags.lastDanceTurns = 3; G.player.心态 = 1; showFloatText('🔥 最后一舞！','#e67e22'); showScene('🔥 最后一舞！\n\n你的心态彻底崩了，但心底的不甘让你爆发了惊人力量。接下来3回合内所有代码力消耗减半！',[{text:'继续战斗', action:function(){ contestRound(); }}]); return;
    }

        G.flags.moodRecoverUsed = true; updStat('心态', 20); addLog('💪 心态自动回复20点！');

function adjustCutoffs() {
    var r=function(){ return Math.floor(Math.random()*16)-8; };
    var diffMul=getDiff().lineMul;
    var base={cspP:230, noipG:200, pTeamA:312, noiG:350, cttP:450, ctsP:350, ioiG:380};
    if(G.flags.difficulty==='hard'){ base.cspP=230; base.noipG=200; base.pTeamA=312; base.noiG=350; base.cttP=450; base.ctsP=350; base.ioiG=380; }
    if(G.flags.difficulty==='hell'){ base.cspP=230; base.noipG=200; base.pTeamA=312; base.noiG=350; base.cttP=450; base.ctsP=350; base.ioiG=380; }
    var f=G.flags.fortune;
    if(f==='small') for(var k in base) base[k]=Math.floor(base[k]*0.9);
    else if(f==='big') for(var k in base) base[k]=Math.floor(base[k]*1.1);
    G.cutoffs = {
        cspP: clamp(Math.floor(base.cspP*diffMul)+r(), 200, 330),
        noipG: clamp(Math.floor(base.noipG*diffMul)+r(), 160, 260),
        pTeamA: clamp(Math.floor(base.pTeamA*diffMul)+r(), 250, 400),
        noiG: clamp(Math.floor(base.noiG*diffMul)+r(), 300, 420),
        cttP: clamp(Math.floor(base.cttP*diffMul)+r(), 400, 650),
        ctsP: clamp(Math.floor(base.ctsP*diffMul)+r(), 300, 500),
        ioiG: clamp(Math.floor(base.ioiG*diffMul)+r(), 320, 450)
    };
}

function prologuePrep() { G.flags.stage='prep'; G.flags.term='上学期'; showScene('📅高一·上学期·赛前准备 (5次训练)', [{text:'开始训练', action:function(){ freeTraining(5, cspContest); } }]); }
function freeTraining(cnt,next){ G.flags.stage='training'; G.flags.trainingCount=0; G.flags.trainingMax=cnt; G.flags.nextCb=next; trainingStep(); }
function nextTraining(){ if(G.flags.trainingCount>=G.flags.trainingMax){ var cb=G.flags.nextCb; if(cb) cb(); } else trainingStep(); }
function trainingStep(){
    if(G.flags.trainingCount>=G.flags.trainingMax){ var cb=G.flags.nextCb; if(cb) cb(); return; }
    G.flags.trainingCount++; playTone(440,0.07,'triangle');
    var itemProb = 0.2 + G.player.社交*0.002 + getDiff().itemBonus; itemProb = Math.max(0,itemProb);
    if(Math.random()<itemProb && G.flags.items.length<4){
        var pool=['免死金牌','小抄','咖啡','幸运符']; var available=pool.filter(function(item){ return G.flags.items.indexOf(item)===-1; });
        if(available.length>0){ var got=available[Math.floor(Math.random()*available.length)]; G.flags.items.push(got); addLog('🎁获得道具：'+got); showFloatText('🎒 获得 '+got,'#1abc9c'); }
    }
    showTrainingOptions();
}
function showTrainingOptions(){
    var baseStudyK=6, baseStudyC=3, baseStudyM=-1;
    var baseDeepK=10, baseDeepM=-2;
    var baseSportM=5, baseSportC=3;
    var baseSocialS=8, baseSocialK=4, baseSocialM=1;
    var baseSleepC=5, baseSleepM=2;
    var sleepC = Math.max(1, Math.floor((G.flags.sleepCount >= 2 ? 2 : 5) * getDiff().trainGainMul));
    var sleepM = Math.max(1, Math.floor((G.flags.sleepCount >= 2 ? 1 : 2) * getDiff().trainGainMul));
    var fatigueHint = (G.flags.sleepCount >= 2) ? '（疲劳减半）' : '';
    var sK = calcActualTrainDelta('知识', baseStudyK);
    var sC = calcActualTrainDelta('代码力', baseStudyC);
    var sM = calcActualTrainDelta('心态', baseStudyM);
    var dK = calcActualTrainDelta('知识', baseDeepK);
    var dM = calcActualTrainDelta('心态', baseDeepM);
    var spM = calcActualTrainDelta('心态', baseSportM);
    var spC = calcActualTrainDelta('代码力', baseSportC);
    var soS = calcActualTrainDelta('社交', baseSocialS);
    var soK = calcActualTrainDelta('知识', baseSocialK);
    var soM = calcActualTrainDelta('心态', baseSocialM);
    var isChenMo = (G.flags.identity && G.flags.identity.id==='退役边缘人');
    var retireText = isChenMo ? ICON.trainRetire+'看退役记 (心态+'+calcActualTrainDelta('心态',8)+') [陈墨专属]' : ICON.trainRetire+'看退役记 (心态'+calcActualTrainDelta('心态',-3)+', 知识+'+calcActualTrainDelta('知识',3)+', 代码力+'+calcActualTrainDelta('代码力',3)+')';
    var opts = [
        {text: ICON.trainStudy+'刷题巩固 (知识+'+sK+' 代码力+'+sC+' 心态'+sM+')', action:function(){ updStat('知识',6); updStat('代码力',3); updStat('心态',-1); G.flags.diary.push('刷题巩固'); G.flags.sleepCount = 0; afterTrainAction(); } },
        {text: ICON.trainDeep+'钻研算法 (知识+'+dK+' 心态'+dM+')', action:function(){ updStat('知识',10); updStat('心态',-2); G.flags.diary.push('钻研算法'); G.flags.sleepCount = 0; afterTrainAction(); } },

    ];

function afterTrainAction(){
    var rand=Math.random(); var m=getEventMult();
    if(rand < getDiff().trainNegProb*0.6){
        var types=['study','deep','social','sleep','retire']; var type=types[Math.floor(Math.random()*types.length)]; var evs=TRAIN_EV[type];
        if(evs){ var ev=evs[Math.floor(Math.random()*evs.length)]; G.flags.diary.push(ev.text);
            if(ev.choices){ showScene('⚡额外随机事件\n'+ev.text, ev.choices.map(function(c){ return { text: c.text(m), action: function(){ c.action(function(){ nextTraining(); }, m); } }; })); }
            else { ev.eff(m); showScene('⚡额外随机事件\n'+ev.text+'\n'+ev.txt(m), [{text:'继续', action:function(){ nextTraining(); } }]); } return; }
    } else if(rand < 0.55){ var ev=RIVAL_EV[Math.floor(Math.random()*RIVAL_EV.length)]; showScene('⚡对手互动\n'+ev.text, ev.choices.map(function(c){ return { text: c.text(m), action: function(){ c.action(function(){ nextTraining(); }, m); } }; })); return; }
    else if(G.flags.identity && CHAR_TRAIN_EV[G.flags.identity.id] && Math.random()<0.25){ var ev=CHAR_TRAIN_EV[G.flags.identity.id][Math.floor(Math.random()*CHAR_TRAIN_EV[G.flags.identity.id].length)]; G.flags.diary.push(ev.text); showScene('⚡角色专属\n'+ev.text+'\n'+ev.txt(m), [{text:'继续', action:function(){ ev.eff(m); nextTraining(); } }]); return; }
    nextTraining();
}

function wcTraining(next) {
    G.flags.term = '寒假';
    G.flags.stage='training';
    G.flags.trainingCount=0;
    G.flags.wcTrainCount=0;
    G.flags.wcQuality=0;
    G.flags.trainingMax=5;
    G.flags.nextCb=next;
    G.flags.wcHistory=[];
    G.flags._wcEventPool = TRAIN_EV.wc.slice();
    showScene('⛄ 通过CTT！进入WC冬令营（5次训练）', [{text:'开始冬令营训练', action:function(){ wcTrainingStep(); } }]);
}
function wcTrainingStep() {
    if(G.flags.wcTrainCount>=5){ var cb=G.flags.nextCb; if(cb) cb(); return; }
    G.flags.wcTrainCount++; playTone(440,0.07,'triangle');
    var pool=G.flags._wcEventPool;
    if(!pool || pool.length===0){ pool=TRAIN_EV.wc.slice(); G.flags._wcEventPool=pool; }
    var count=Math.min(3, pool.length);
    var shuffled=pool.slice().sort(function(){ return Math.random()-0.5; });
    var options=shuffled.slice(0,count);
    var choiceList=options.map(function(ev,idx){
        var plainText=ev.text.replace(/<[^>]+>/g,'');
        var shortDesc=plainText.length>25?plainText.substring(0,25)+'...':plainText;
        var qualityText=ev.quality?'⭐质量+'+ev.quality:'';
        var bonusHint=ev.bonus?' 🎲':'';
        var linkHint=ev.link?' 🔗':'';
        return {
            text: (idx+1)+'. '+shortDesc+(qualityText?' '+qualityText:'')+bonusHint+linkHint,
            action: function(){
                var index=G.flags._wcEventPool.indexOf(ev);
                if(index!==-1) G.flags._wcEventPool.splice(index,1);
                var m=getEventMult();
                G.flags.diary.push(ev.text);
                ev.eff(m);
                var extraText='';
                if(ev.link){
                    var matched=ev.link.requires.some(function(keyword){
                        return G.flags.wcHistory.some(function(hist){
                            return hist.indexOf(keyword)!==-1;
                        });
                    });
                    if(matched){ ev.link.eff(m); extraText+=' '+ev.link.txt; addLog('🔗 联动触发！'+ev.link.txt); }
                }
                if(ev.bonus && Math.random()<ev.bonus.chance){
                    ev.bonus.eff(m); extraText+=' '+ev.bonus.txt; addLog('🎲 随机加成触发！'+ev.bonus.txt);
                }
                G.flags.wcHistory.push(ev.text);
                if(ev.quality) G.flags.wcQuality+=ev.quality;
                showScene('⛄ WC冬令营 ('+G.flags.wcTrainCount+'/5)\n'+ev.text+'\n'+ev.txt(m)+extraText+' | 质量分：'+G.flags.wcQuality, [
                    {text:'继续', action:function(){ wcTrainingStep(); } }
                ]);
            }
        };
    });
    while(choiceList.length<3){
        choiceList.push({
            text: '休息调整 (心态+5)',
            action: function(){
                updStat('心态',5);
                G.flags.diary.push('休息调整');
                showScene('⛄ WC冬令营 ('+G.flags.wcTrainCount+'/5)\n你选择休息，心态+5 | 质量分：'+G.flags.wcQuality, [
                    {text:'继续', action:function(){ wcTrainingStep(); } }
                ]);
            }
        });
    }
    showScene('⛄ 第'+G.flags.wcTrainCount+'次训练 - 选择一项活动：', choiceList);
}

            showScene('💔CSP-S爆零', [
                {text:'明年再战', action:function(){ advanceYear(); }},
                {text:'退役', action:function(){ endGame('退役'); }}
            ]);
        } else if (G.flags.year === 2 && G.flags.eliteMode) {
            showScene('CSP-S爆零，失去NOIP和省选资格，但精英路线直接进入CTT选拔。', [{text:'继续', action:function(){ G.flags.stage='prep'; freeTraining(3, cttDay1); } }]);
        } else if (G.flags.year === 3) {
            showScene('CSP-S爆零，失去NOIP参赛资格，但训练继续。', [{text:'继续训练', action:function(){ freeTraining(3, function(){ cttDay1(); }); } }]);
        } else {
            endGame('CSP-S爆零，竞赛生涯结束');
        }
    } else {
        G.flags.cspPassed = true;
        if (G.flags.year === 3) {
            showScene('CSP-S 得分：'+score+'（纯参与）', [{text:'继续', action:function(){ freeTraining(3, seniorNOIPContest); } }]);

            showScene('🎉CSP-S：'+score+'分\n'+award, [{text:'进入NOIP训练', action:function(){ G.flags.stage='prep'; freeTraining(3, noipContest); } }]);
        }

}

function checkCTSResult(ctsTotal) {
    var dailyScore = Math.min(100, G.flags.wcQuality * 10);
    var finalScore = Math.floor(G.flags.scores.ctt * 0.54 + ctsTotal * 0.36 + dailyScore * 0.1);
    G.flags.scores.cts = ctsTotal;
    var award = getCTSAward(finalScore);
    addAward(award);
    if (finalScore >= G.cutoffs.ctsP) {
        showScene('🏆 加权总分：'+finalScore+'\n'+award+'\n入选国家队！', [{text:'备战IOI', action:function(){ G.flags.stage='prep'; updateDisplay(); freeTraining(3, ioiDay1); } }]);
    } else {
        if (G.flags.sprintBQualified && G.flags.year !== 3) {
            showScene('CTS未通过，但你有金牌资格，高三可继续冲刺B。', [{text:'进入高三冲刺B', action:function(){
                G.flags.year = 3;
                G.flags.term = '上学期';
                G.flags.stage = 'prep';
                updateDisplay();
                freeTraining(5, seniorCSPContest);
            }}]);
        } else {
            endGame('CTS未通过，无缘国家队。');
        }
    }
}

function advanceYear() {
    if (G.flags.year >= 2) { endGame('竞赛生涯结束'); return; }
    G.flags.year++;
    G.flags.term = '上学期';
    G.player.代码力 = clamp(Math.floor(G.player.代码力 * 0.8) + 15, 0, 150);
    G.player.心态 = Math.floor(G.player.心态 * 0.8);
    G.player.知识 = Math.floor(G.player.知识 * 0.8);
    G.player.社交 = Math.floor(G.player.社交 * 0.8);
    adjustCutoffs();
    showScene('重新开始，这次是高二了。', [{text:'开始新赛季', action:function(){ G.flags.stage='prep'; updateDisplay(); freeTraining(5, cspContest); } }]);
}

function selectStrategy(next) { var recommend=''; if(G.player.代码力<40) recommend=' 💡推荐：稳扎稳打'; else if(G.player.知识>70) recommend=' 💡推荐：放手一搏'; else if(G.player.心态<40) recommend=' 💡推荐：心态调整'; showScene('🎯 选择本场策略：'+recommend, [{text:'稳扎稳打（绿色+15%）', action:function(){ G.flags.strategy='steady'; next(); } }, {text:'放手一搏（黄色+20%）', action:function(){ G.flags.strategy='risky'; next(); } }, {text:'心态调整（跳题额外+5心态）', action:function(){ G.flags.strategy='mood'; next(); } }]); }
function startContest(name,probs,desc,next){
    G.flags.stage='contest'; G.flags.curContest=name; G.flags.cMaxP=probs; G.flags.round=0;
    G.flags.cScore = (G.flags.identity && G.flags.identity.sp==='mood_recover') ? -10 : 0;
    if (G.player.社交 > 50 && Math.random() < G.player.社交 * 0.005) {
        G.flags.cScore += 5;
        addLog('🤝 队友鼓励，初始心态+5');
    }
    G.flags.cProbScore=0; G.flags.nextProbBonus=false; G.flags.curProbBonus=false; G.flags.nextCb=next; G.flags.rerollCount=0; G.flags.lastAction=null;
    G.flags.moodRecoverUsed = false;
    G.flags.contestTier = getContestTier(name);
    G.flags.lastDanceTriggered = false; G.flags.lastDanceTurns = 0; G.flags.lastWasEvent = false;
    G.flags.剩余回合加成 = 1; // 重置加成
    showScene('🏁 '+name+' ('+getTierLabel(G.flags.contestTier)+')\n'+desc+'\n题目数：'+probs+'题', [{text:'开始比赛', action:function(){ selectStrategy(function(){ showItemUseOptions(function(){ contestRound(); }); }); } }]);
}

var DIFFICULTY_MAP = {
    'CSP-S': [1.0, 0.90, 0.80, 0.70],
    'NOIP': [1.0, 0.88, 0.76, 0.64],
    '省选Day1': [1.0, 0.85, 0.70],
    '省选Day2': [1.0, 0.85, 0.70],
    'NOI Day1': [1.0, 0.80, 0.60],
    'NOI Day2': [1.0, 0.80, 0.60],
    'CTT Day1': [1.0, 0.78, 0.56],
    'CTT Day2': [1.0, 0.78, 0.56],
    'CTT Day3': [1.0, 0.78, 0.56],
    'CTS Day1': [1.0, 0.75, 0.50],
    'CTS Day2': [1.0, 0.75, 0.50],
    'IOI Day1': [1.0, 0.70, 0.45],
    'IOI Day2': [1.0, 0.70, 0.45]
};

function showCardsForCurrentRound() {
    var m = getEventMult();
    var teamBonus = false;
    if (G.player.社交 > 60 && Math.random() < G.player.社交 * 0.003) {
        teamBonus = true;
        addLog('🤝 团队协作！本回合得分+10%');
    }
    var envText = getActionEnv(G.flags.lastAction);
    var diff = getDiff(), costMul = diff.costMul || 1, hc = G.flags.lastDanceTurns > 0, id = G.flags.identity;
    var tier = G.flags.contestTier;
    var tierScoreMul = getTierScoreMul(tier);
    var tierCostMul = getTierCostMul(tier);
    var c8 = Math.round(8 * costMul * tierCostMul), c15 = Math.round(15 * costMul * tierCostMul), c12 = Math.round(12 * costMul * tierCostMul), c20 = Math.round(20 * costMul * tierCostMul);
    var moodMul = G.player.心态 > 70 ? 1.05 : G.player.心态 < 30 ? 0.85 : 1;
    var safeMul = (G.flags.strategy === 'steady') ? 1.15 : 1, riskMul = (G.flags.strategy === 'risky') ? 1.2 : 1;
    // 应用剩余回合加成（算分崩溃事件）
    var remainingMul = G.flags.剩余回合加成 || 1;
    var phase = G.flags.round % 3, problemNum = Math.floor(G.flags.round / 3) + 1;
    
    var contestName = G.flags.curContest;
    var difficultyArr = DIFFICULTY_MAP[contestName];
    if (!difficultyArr) difficultyArr = [1.0, 0.9, 0.8, 0.7];
    var probIndex = Math.min(problemNum - 1, difficultyArr.length - 1);
    var baseDifficulty = difficultyArr[probIndex] || 1.0;
    
    var knowledgeMul = 0.4 + G.player.知识 / 100 * 1.1;
    var totalMul = baseDifficulty * knowledgeMul * moodMul * tierScoreMul * remainingMul;
    if (teamBonus) totalMul *= 1.1;
    
    var baseJumpMood = 10;
    if (phase === 1) baseJumpMood = 7;
    else if (phase === 2) baseJumpMood = 3;
    var jumpMood = baseJumpMood + ((G.flags.strategy === 'mood') ? 5 : 0);
    
    var cards = [];
    if (phase === 0) {
        var b1 = Math.floor(30 * diff.scoreMul * totalMul * safeMul);
        var b2 = Math.floor(75 * diff.scoreMul * totalMul * riskMul);
        cards = [
            {text: ICON.green + '暴力思路 (+' + b1 + '分, 代码力-' + c8 + ')', action: function(){ addScore(b1); updStat('代码力', hc ? -Math.round(c8/2) : -c8); G.flags.lastAction='brute'; afterCard(); } },
            {text: ICON.yellow + '正解思路 (+' + b2 + '分, 代码力-' + c15 + ')', action: function(){ addScore(b2); updStat('代码力', hc ? -Math.round(c15/2) : -c15); G.flags.lastAction='correct'; afterCard(); } },
            {text: ICON.yellow + '跳题 (0分, 心态+' + jumpMood + ')', action: function(){ skipProblem(jumpMood); } }
        ];
        if (G.player.知识 >= 70) { 
            var cb = Math.floor(85 * diff.scoreMul * totalMul * safeMul);
            cards.push({text: ICON.purple + '巧解思路 (+' + cb + '分, 代码力-5)', action: function(){ addScore(cb); updStat('代码力', hc ? -3 : -5); G.flags.lastAction='correct'; afterCard(); } }); 
        }
    } else if (phase === 1) {
        var b1 = Math.floor(35 * diff.scoreMul * totalMul * safeMul);
        var b2 = Math.floor(45 * diff.scoreMul * totalMul * riskMul);
        var bugProb = 0.3 + diff.bugAdd;
        cards = [
            {text: ICON.green + '稳健实现 (+' + b1 + '分, 代码力-' + c12 + ')', action: function(){ addScore(b1); updStat('代码力', hc ? -Math.round(c12/2) : -c12); G.flags.lastAction='stable'; afterCard(); } },
            {text: ICON.yellow + '快速编码 (+' + b2 + '分, 代码力-' + c20 + ', 可能出bug)', action: function(){ var s = b2; if (Math.random() < bugProb) s -= Math.floor(20 * m.neg); addScore(s); updStat('代码力', hc ? -Math.round(c20/2) : -c20); G.flags.lastAction='fast'; afterCard(); } },
            {text: ICON.yellow + '跳题 (0分, 心态+' + jumpMood + ')', action: function(){ skipProblem(jumpMood); } }
        ];
    } else {
        var dp = clamp(0.9 + diff.duipaiAdd, 0.2, 1);
        var rerollLeft = 3 - G.flags.rerollCount;
        var segChoices = [
            {text: ICON.green + '简单测试 (+' + Math.floor(10 * diff.scoreMul * totalMul * safeMul) + '分)', action: function(){ addScore(Math.floor(10 * diff.scoreMul * totalMul * safeMul)); G.flags.lastAction='test'; afterCard(); } },
            {text: ICON.yellow + '写对拍 (代码力-' + c15 + ', ' + Math.round(dp * 100) + '% +' + Math.floor(25 * diff.scoreMul * totalMul * riskMul) + '分)', action: function(){ updStat('代码力', hc ? -Math.round(c15/2) : -c15); if (Math.random() < dp) addScore(Math.floor(25 * diff.scoreMul * totalMul * riskMul)); G.flags.lastAction='check'; afterCard(); } },
            {text: ICON.yellow + '跳题 (0分, 心态+' + jumpMood + ')', action: function(){ skipProblem(jumpMood); } }
        ];
        if (rerollLeft > 0) { 
            segChoices.push({text: ICON.red + '段错误 (心态-' + Math.floor(10 * m.neg) + (G.player.知识 >= 60 ? ' (减半)' : '') + ', 重选本回合, 剩余' + rerollLeft + '次)', action: function(){
                var moodLoss = Math.floor(10 * m.neg);
                if (G.player.知识 >= 60) moodLoss = Math.floor(moodLoss / 2);
                updStat('心态', -moodLoss);
                if (Math.random() < 0.3) { addScore(Math.floor(5 * m.pos)); addLog('🔍排查段错误时意外发现隐藏bug，本题+' + Math.floor(5 * m.pos) + '分'); }
                G.flags.rerollCount++; G.flags.lastAction='segment'; G.flags.skipNextRound=true; afterCard();
            } }); 
        }
        cards = segChoices;
    }
    var lc = 0;
    if (G.player.社交 > 60 && G.player.知识 > 40) lc = 0.08;
    if (id && id.id === '刷题机器' && G.player.代码力 > 120) lc = 0.12;
    if (id && id.id === '天赋怪' && G.player.知识 > 60) lc = 0.12;
    if (id && id.id === '退役边缘人' && G.player.心态 < 20) lc = 0.18;
    lc = Math.max(0.03, lc - (tier - 1) * 0.008);
    if (Math.random() < lc) {
        var legendScore = Math.floor(80 * tierScoreMul * m.pos * baseDifficulty * knowledgeMul);
        cards.push({text: ICON.gold + '传说灵感 (+' + legendScore + '分, 心态+10, 无消耗) [概率' + Math.round(lc*100) + '%]', action: function(){ addScore(legendScore); updStat('心态', Math.floor(10 * m.pos)); G.flags.lastAction='legend'; playTone(880, 0.12); showFloatText('⭐ 传说灵感！', '#e84393'); addLog('✨ 灵光一闪！'); afterCard(); } });
    }
    // 刷题机器：读错题概率动态
    if (id && id.id === '刷题机器') {
        var readProb = 0.3 + (G.flags.difficulty === 'hard' ? 0.1 : G.flags.difficulty === 'hell' ? 0.15 : 0);
        if (Math.random() < readProb) { 
            var readScore = Math.floor(10 * m.pos * baseDifficulty * knowledgeMul);
            cards.push({text: ICON.red + '读错题 (心态-' + Math.floor(20 * m.neg) + ', +' + readScore + '分) [刷题机器专属]', action: function(){ updStat('心态', -Math.floor(20 * m.neg)); addScore(readScore); G.flags.hiddenFlags.grinderClean++; G.flags.lastAction='read'; afterCard(); } }); 
        }
    }
    if (!cards.some(function(c){ return c.text.indexOf('跳题') !== -1; })) cards.push({text: ICON.yellow + '跳题 (0分, 心态+' + jumpMood + ')', action: function(){ skipProblem(jumpMood); } });
    if (G.player.代码力 < 30) {
        var jumpCard = cards.filter(function(c){ return c.text.indexOf('跳题') !== -1; })[0];
        var otherCards = cards.filter(function(c){ return c.text.indexOf('跳题') === -1; });
        if (otherCards.length > 0) cards = jumpCard ? [jumpCard, otherCards[Math.floor(Math.random() * otherCards.length)]] : [otherCards[0]];
        else cards = jumpCard ? [jumpCard] : [];
    }
    cards = (G.player.社交 > 60) ? cards.slice(0, 4) : cards.slice(0, 3);
    showScene('📝第' + problemNum + '题 · ' + ['思路与实现','编码与构造','调试与提交'][phase] + '\n' + envText + '\n当前总分：' + G.flags.cScore + ' (本题' + G.flags.cProbScore + '/100)', cards, true);
}

// ===== 后续核心函数（完整）=====
function afterCard() {
    var m = getEventMult();
    if (G.flags.round === 3) {
        var choices = [
            {text: "👀偷看 (50%分数+" + Math.floor(20 * m.pos) + "，50%被发现心态-" + Math.floor(15 * m.neg) + ")", action: function(){ if (Math.random() < 0.5) { addScore(Math.floor(20 * m.pos)); } else { updStat('心态', -Math.floor(15 * m.neg)); } afterSpecial(); } },
            {text: "🙈专注自己 (心态+" + Math.floor(5 * m.pos) + "，代码力+" + Math.floor(3 * m.pos) + ")", action: function(){ updStat('心态', Math.floor(5 * m.pos)); updStat('代码力', Math.floor(3 * m.pos)); afterSpecial(); } }
        ];
        if (G.player.社交 > 60) choices.push({text: "💬和旁边人交流思路 (知识+" + Math.floor(5 * m.pos) + "，心态+" + Math.floor(3 * m.pos) + ")", action: function(){ updStat('知识', Math.floor(5 * m.pos)); updStat('心态', Math.floor(3 * m.pos)); afterSpecial(); } });
        showScene("👀 第4回合 · 诱惑\n\n你旁边的人开始对拍，他的屏幕上一排绿色AC。你忍不住想看。", choices); return;
    }
    // ========== 修复：算分崩溃（剩余回合分数+20%） ==========
    if (G.flags.round === 6) {
        showScene("🧮 第7回合 · 自我怀疑\n\n你按了一下计算器。就算后面全满分，总分也够呛。", [
            {text: "🎯算分崩溃 (心态-" + Math.floor(15 * m.neg) + "，剩余回合分数+20%)", action: function(){ 
                updStat('心态', -Math.floor(15 * m.neg)); 
                G.flags.剩余回合加成 = 1.2; 
                addLog('⚠️ 剩余回合分数+20%');
                afterSpecial(); 
            } },
            {text: "🧘不再想分数 (心态+" + Math.floor(10 * m.pos) + ")", action: function(){ updStat('心态', Math.floor(10 * m.pos)); afterSpecial(); } }
        ]); return;
    }
    if (G.flags.round === 7 && G.player.代码力 < 30) {
        var choices8 = [
            {text: "💪硬写 (代码力-" + Math.floor(20 * m.neg) + "，本题分数+" + Math.floor(25 * m.pos) + ")", action: function(){ updStat('代码力', -Math.floor(20 * m.neg)); addScore(Math.floor(25 * m.pos)); afterSpecial(); } },
            {text: "🚰去洗把脸 (跳过本回合，代码力+" + Math.floor(40 * m.pos) + ")", action: function(){ updStat('代码力', Math.floor(40 * m.pos)); skipToNextRound(); } }
        ];
        if (G.player.社交 > 50) choices8.push({text: "📲给队友发求救信号 (跳过本回合，代码力+" + Math.floor(20 * m.pos) + "，心态+" + Math.floor(5 * m.pos) + ")", action: function(){ updStat('代码力', Math.floor(20 * m.pos)); updStat('心态', Math.floor(5 * m.pos)); skipToNextRound(); } });
        showScene("💥 第8回合 · 崩溃\n\n你盯着屏幕，那些字母突然变得陌生。", choices8); return;
    }
    if (G.flags.round === 10) {
        showScene("⏳ 第11回合 · 抉择\n\n只剩最后半小时。你还有一题完全没动，但上一题的bug还在。", [
            {text: "🔧死磕上一题 (失去本回合，上一题分数×1.5)", action: function(){ var newProb = Math.min(100, Math.floor(G.flags.cProbScore * 1.5)); G.flags.cScore += newProb - G.flags.cProbScore; G.flags.cProbScore = newProb; afterSpecial(); } },
            {text: "🆕放弃debug，开新题 (30%概率爆零，否则+" + Math.floor(40 * m.pos) + ")", action: function(){ if (Math.random() < 0.3) addScore(-Math.floor(30 * m.neg)); else addScore(Math.floor(40 * m.pos)); afterSpecial(); } },
            {text: "📄交白卷，保心态 (心态+" + Math.floor(30 * m.pos) + "，分数不变)", action: function(){ updStat('心态', Math.floor(30 * m.pos)); afterSpecial(); } }
        ]); return;
    }
    if (G.flags.round === G.flags.cMaxP * 3 - 1 && Math.random() < 0.05) {
        showScene("🌟 最后一题的奇迹\n\n这道题，你两周前在洛谷做过一模一样的。", [
            {text: "拿下满分！ (本题满分，心态+" + Math.floor(20 * m.pos) + "，+" + Math.floor(60 * m.pos) + "分)", action: function(){ addScore(Math.floor(60 * m.pos)); updStat('心态', Math.floor(20 * m.pos)); afterSpecial(); } }
        ]); return;
    }
    afterSpecial();
}

function afterSpecial() {
    var m = getEventMult();
    var eventProb = getDiff().eventProb * getTierEventMul(G.flags.contestTier);
    if (G.flags.lastWasEvent) eventProb *= 0.3;
    if (Math.random() < eventProb) {
        var ev;
        if (G.flags.fortune === 'lucky' && Math.random() < 0.3) { ev = RAND_EV[7]; }
        else if (G.flags.fortune === 'disaster' && Math.random() < 0.6) { var negEvs = RAND_EV.filter(function(e){ return e.negative; }); ev = negEvs[Math.floor(Math.random() * negEvs.length)]; }
        else { if (G.flags.identity && G.flags.identity.id && Math.random() < 0.3) ev = ID_EV[G.flags.identity.id]; if (!ev) ev = RAND_EV[Math.floor(Math.random() * RAND_EV.length)]; }
        G.flags.lastWasEvent = true;
        showScene('⚡随机事件\n' + ev.text, ev.choices.map(function(c){ return { text: typeof c.text === 'function' ? c.text(m) : c.text, action: function(){ c.action(function(){ doNext(); }, m); } }; }));
        return;
    }
    G.flags.lastWasEvent = false;
    doNext();
}

function skipToNextRound() { G.flags.round++; contestRound(); }
function doNext() { if (G.flags.lastDanceTurns > 0) G.flags.lastDanceTurns--; if (!G.flags.skipNextRound) { G.flags.round++; G.flags.rerollCount = 0; } else { G.flags.skipNextRound = false; } contestRound(); }
function skipProblem(jumpMood) { updStat('心态', jumpMood); G.flags.lastAction='skip'; G.flags.round = (Math.floor(G.flags.round / 3) + 1) * 3; contestRound(); }

function contestRound() {
    if (G.flags.gameOver) return;
    if (!G.flags.lastDanceTriggered) { 
        if (G.player.代码力 <= 15 && G.flags.items.indexOf('咖啡') !== -1) { useItem('咖啡'); addLog('☕ 代码力不足，自动使用咖啡'); } 
        if (G.player.心态 <= 15 && G.flags.items.indexOf('免死金牌') !== -1 && (!G.flags.identity || G.flags.identity.sp !== 'last_dance')) { useItem('免死金牌'); addLog('🛡️ 心态危急，自动使用免死金牌'); } 
    }
    if (G.player.代码力 <= 0 && !G.flags.lastDanceTriggered) { addLog('代码力耗尽，比赛结束。'); endContest(); return; }
    if (G.player.心态 <= 0 && !G.flags.lastDanceTriggered && (!G.flags.identity || G.flags.identity.sp !== 'last_dance')) { addLog('心态崩溃，当场退赛。'); endContest(); return; }
    if (G.flags.lastDanceTurns === 0 && G.flags.lastDanceTriggered) { addLog('最后一舞余烬熄灭，强制退赛。'); endContest(); return; }
    if (G.flags.round >= G.flags.cMaxP * 3) { endContest(); return; }
    if (G.flags.round % 3 === 0) { G.flags.rerollCount = 0; G.flags.cProbScore = 0; G.flags.curProbBonus = G.flags.nextProbBonus; G.flags.nextProbBonus = false; }
    if (G.player.心态 < 20 && !G.flags.lastDanceTriggered) { updStat('心态', -5); addLog('⚡退役诅咒：心态低于20，每回合额外-5心态。'); }
    showCardsForCurrentRound();
}

// ===== endContest 统一调用 next（修复爆零问题）=====
function endContest() {
    if (G.flags.gameOver) return;
    var s = G.flags.cScore, next = G.flags.nextCb;
    if (s > G.flags.bestScore) { G.flags.bestScore = s; G.flags.bestScoreName = G.flags.curContest; }
    var tier = G.flags.contestTier;
    var rivalMul = getTierRivalMul(tier);
    var maxPossible = G.flags.cMaxP * 100;
    
    G.flags.rivals.forEach(function(r) {
        var base = Math.min(s, maxPossible);
        if (base <= 0) base = Math.floor(maxPossible * 0.3);
        var minRatio, maxRatio;
        if (r.name === '省队预定哥') {
            minRatio = 1.15; maxRatio = 1.35;
        } else if (r.name === '神秘大佬') {
            minRatio = 1.3; maxRatio = 1.8;
        } else {
            minRatio = 0.8; maxRatio = 1.2;
        }
        var ratio = minRatio + Math.random() * (maxRatio - minRatio);
        ratio += (tier - 1) * 0.02;
        r.score = clamp(Math.floor(base * ratio * rivalMul), Math.floor(maxPossible * 0.1), maxPossible);
    });
    
    var rivalStr = G.flags.rivals.map(function(r){ return r.name + ': ' + r.score + '分'; }).join('\n');
    if (s > 0) {
        var em = getDiff().expMul || 1;
        var mult = (G.flags.fortune === 'disaster') ? 1.7 : 1;
        mult *= em;
        if (G.flags.lastDanceTriggered) mult *= 1.3;
        var b = Math.min(60, Math.floor((Math.floor(s / 6) + 4) * mult));
        if (G.player.社交 > 70) b = Math.floor(b * 1.2);
        updStat('代码力', b);
        updStat('心态', Math.floor(b * 0.6));
        addLog('📈比赛经验：代码力+'+b+' 心态+'+Math.floor(b*0.6));
    }
    setTimeout(function() {
        if (typeof next !== 'function') {
            addLog('❌ 错误：比赛回调函数缺失，返回主菜单');
            showScene('流程错误，请重新开始。', [{text:'返回主菜单', action:mainMenu}]);
            return;
        }
        showScene(G.flags.curContest + '得分：' + s + '分\n\n对手成绩：\n' + rivalStr, [{
            text: '继续',
            action: function() {
                try {
                    next(s);
                } catch(e) {
                    console.error('继续按钮执行出错：', e);
                    addLog('❌ 错误：' + e.message);
                    showScene('发生错误：' + e.message + '\n请返回主菜单重新开始。', [{text:'返回主菜单', action:mainMenu}]);
                }
            }
        }]);
    }, 500);
}

function endGame(msg) {
    G.flags.stage = 'ending'; G.flags.gameOver = true;
    if (G.flags.hiddenFlags.darkestMood <= 5) unlockHidden('至暗时刻');
    if (G.flags.hiddenFlags.luckyCount >= 3) unlockHidden('欧皇降临');
    if (G.flags.identity && G.flags.identity.sp === 'last_dance' && G.flags.lastDanceTriggered && G.awards.some(function(a){ return a.indexOf('等奖') !== -1 || a.indexOf('金牌') !== -1; })) unlockHidden('燃烧殆尽');
    if (G.flags.identity && G.flags.identity.id === '刷题机器' && G.flags.hiddenFlags.grinderClean <= 2) unlockHidden('冷酷机器');
    if (G.flags.hiddenFlags.社交高 && G.player.社交 > 80) unlockHidden('良师益友');
    if (G.flags.hiddenFlags.社交低 && G.awards.some(function(a){ return a.indexOf('等奖') !== -1 || a.indexOf('金牌') !== -1; })) unlockHidden('独行侠');
    var summary = msg + '\n\n📊最终属性：\n代码力' + G.player.代码力 + ' 心态' + G.player.心态 + ' 知识' + G.player.知识 + ' 社交' + G.player.社交;
    summary += '\n\n🏅获得奖项：\n' + (G.awards.length ? G.awards.join('\n') : '无');
    summary += '\n✨隐藏成就：' + (G.hiddenAch.length ? G.hiddenAch.join(', ') : '无');
    showScene(summary, [{text:'🏛️档案馆', action:function(){ showArchive(); } }, {text:'🏠主菜单', action:mainMenu}]);
}

// ===== 初始化 =====
function init() {
    ensureArrays();
    updateDisplay();
    addLog('欢迎，OIer。');
    initVolume();
    mainMenu();
}
if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
else init();

})();
</script>
</body>
</html>
