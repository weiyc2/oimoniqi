<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OI生涯模拟器</title>
    <style>
        :root {
            --bg: #0a0f1a;
            --panel: #111d2b;
            --border: #2c3e50;
            --text: #c8d6e5;
            --gold: #f1c40f;
            --blue: #3498db;
            --green: #2ecc71;
            --orange: #e67e22;
            --purple: #9b59b6;
            --teal: #1abc9c;
            --red: #e74c3c;
            --pink: #e84393;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg);
            font-family: system-ui, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 12px;
            color: var(--text);
            background-image: radial-gradient(ellipse at 20% 20%, #1a2f40 0%, #0a0f1a 80%);
        }
        #game-container {
            width: 100%;
            max-width: 860px;
            background: var(--panel);
            border: 2px solid var(--border);
            border-radius: 20px;
            padding: 18px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            gap: 14px;
            position: relative;
            min-height: 90vh;
        }
        #title-area {
            text-align: center;
            font-size: 1.9rem;
            font-weight: 700;
            color: var(--gold);
            border-bottom: 1px dashed var(--border);
            padding-bottom: 8px;
        }
        .volume-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 4px;
            font-size: 0.8rem;
            color: #95a5a6;
        }
        .volume-row input {
            width: 80px;
        }
        .mute-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 1.3rem;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 8px;
        }
        .mute-btn.muted {
            color: var(--red);
            border-color: var(--red);
        }
        .year-badge {
            position: absolute;
            top: 18px;
            right: 70px;
            background: var(--gold);
            color: #0a0f1a;
            font-weight: bold;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            z-index: 10;
        }
        .stars-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            border-radius: 20px;
            z-index: 0;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.4;
            animation: twinkle 3s infinite alternate;
        }
        @keyframes twinkle {
            from {
                opacity: 0.3;
            }
            to {
                opacity: 0.8;
            }
        }
        .stats-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            background: #162433;
            padding: 14px;
            border-radius: 14px;
            font-size: 0.8rem;
        }
        .stat-item {
            flex: 1;
            min-width: 70px;
        }
        .stat-label {
            color: #95a5a6;
            font-size: 0.65rem;
            text-transform: uppercase;
        }
        .stat-bar-bg {
            background: #2c3e50;
            height: 6px;
            border-radius: 10px;
            overflow: hidden;
            margin: 2px 0;
        }
        .stat-bar-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.4s;
        }
        .code-fill {
            background: var(--green);
        }
        .mood-fill {
            background: var(--orange);
        }
        .know-fill {
            background: var(--purple);
        }
        .social-fill {
            background: var(--teal);
        }
        #scene-content {
            background: #1a2e40;
            border-radius: 14px;
            padding: 18px;
            min-height: 160px;
            line-height: 1.6;
            white-space: pre-wrap;
            overflow-y: auto;
        }
        .choices-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .choice-btn {
            background: #233b4a;
            border: none;
            color: #f0f4f8;
            padding: 12px 16px;
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            text-align: left;
            border-left: 5px solid var(--blue);
            width: 100%;
        }
        .choice-btn:hover {
            background: #2f4d62;
            border-left-color: var(--gold);
        }
        .choice-btn:disabled {
            opacity: 0.6;
        }
        #log-panel {
            background: #0c1a24;
            border-radius: 8px;
            padding: 8px;
            max-height: 80px;
            overflow-y: auto;
            font-size: 0.7rem;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .log-entry {
            padding: 2px 6px;
            background: #162433;
        }
        .log-entry.gain {
            color: #2ecc71;
        }
        .log-entry.loss {
            color: #e74c3c;
        }
        .float-text {
            position: fixed;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--gold);
            z-index: 999;
            pointer-events: none;
            animation: floatUp 2s ease-out forwards;
        }
        @keyframes floatUp {
            0% {
                opacity: 1;
                top: 30%;
            }
            100% {
                opacity: 0;
                top: 10%;
            }
        }
        .tab-container {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }
        .tab {
            background: #2c3e50;
            padding: 6px 12px;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            font-weight: bold;
            color: #b0c4de;
            font-size: 0.7rem;
        }
        .tab.active {
            background: var(--gold);
            color: #0a0f1a;
        }
        .notebook {
            background: #fef9e7;
            color: #2c3e50;
            padding: 18px;
            border-radius: 12px;
            font-family: cursive;
            line-height: 1.9;
            background-image: linear-gradient(#e0d7c0 1px, transparent 1px);
            background-size: 100% 32px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #2c3e50;
            border-radius: 4px;
            margin: 8px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--gold);
            transition: width 0.3s;
        }
        .diff-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
            box-shadow: 0 0 6px currentColor;
        }
        .diff-easy {
            background: #2ecc71;
        }
        .diff-normal {
            background: #f1c40f;
        }
        .diff-hard {
            background: #e67e22;
        }
        .diff-hell {
            background: #e74c3c;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div class="stars-bg" id="stars-bg"></div>
        <div id="title-area">🏆 OI生涯模拟器</div>
        <div class="volume-row">
            <span>🔊 音量</span>
            <input type="range" min="0" max="0.15" step="0.01" value="0.07" id="volSlider">
            <span id="volVal">7%</span>
            <button class="mute-btn" id="mute-btn" title="音效">🔊</button>
        </div>
        <span id="year-badge" class="year-badge" style="display:none;">高一</span>
        <div id="stats-panel" class="stats-panel"></div>
        <div id="scene-content"></div>
        <div id="choices-container" class="choices-container"></div>
        <div id="log-panel"></div>
    </div>

    <script>
        (function() {
            // ========== 教程文本 ==========
            const tutorialTexts = [
                '欢迎来到OI生涯模拟器！你将扮演一名高一新生，在三年时光里完整经历CSP-S、NOIP、省选、NOI、CTT、CST，直至IOI。游戏的核心是管理四项属性——代码力、心态、知识、社交——在比赛之间的有限训练中提升自己，在每一场比赛中利用卡牌策略争取最好的成绩。比赛失利并不意味着结束，你可以选择"明年再战"继续成长。你可以从简单、普通、困难、地狱四种难度中选择，难度会影响分数线、得分倍率、事件概率等几乎所有方面。越高级的比赛（NOI/CTT/CST/IOI）难度会显著提升，对手也会更强。',
                '游戏开始时，你可以从四位性格鲜明的主角中选择一位，每位都有独特的能力与弱点：\n\n1. 陈墨·退役边缘人：去年普及组爆零，背负着阴影重新开始。当心态彻底崩溃时，会触发"最后一舞"，3回合内所有代码力消耗减半，但初始心态只有60。看退役记对他来说是力量的源泉，心态+8。\n\n2. 林思远·天赋怪：初中被称为天才，上了高中却开始失眠。所有比赛得分自动+20%，但队友交卷时心态会额外降低。\n\n3. 张浩·刷题机器：刷了三千题，代码力上限提升至150，初始100，但"读错题"的概率翻倍。\n\n4. 苏晓雨·女队独苗：全省唯一进复赛的女生。心态低于30时会自动回复20点（仅一次），每场比赛初始分数-10，专属事件可触发下题得分+15%。',
                '四个属性条贯穿整个游戏：\n\n💻代码力：你的编码硬实力。比赛时许多卡牌会消耗它，归零则比赛强制结束。训练和休息可恢复。低于30时每回合可选卡牌会减少。\n\n🧠心态：心理状态。高于70时得分×1.05，低于30时×0.85。归零将导致当场崩溃退赛。\n\n📚知识：算法功底。直接影响正解思路的分数，知识≥80时将解锁"巧解思路"卡牌，消耗更少但得分更高。\n\n🤝社交：与队友和教练的关系。社交>60时每回合可选卡牌从3张变为4张；社交>70时，队友纸条事件一定是好消息；社交>50时，训练负面事件效果减半；社交越高，训练中获得道具的概率越大。',
                '每次比赛前有训练环节。CSP-S之前有5次训练机会，此后每场比赛前3次。你可以选择：\n\n· 刷题巩固：知识+5 代码力+2 心态-1\n· 钻研算法：知识+8 心态-3\n· 运动放松：心态+6 代码力+1\n· 与同学交流：社交+6 知识+3（社交>50额外知识+2）\n· 保证睡眠：代码力+7 心态+3\n· 看退役记：陈墨心态+8；其他人知识+3 代码力+3 心态-3\n· 查看训练日记：随时回顾全部训练记录\n\n每次训练有概率触发额外随机事件，不会覆盖正常训练。训练中也可能遇到对手互动。道具会随机掉落，获得概率受社交和难度影响。注意：训练获得的实际数值受难度影响，高难度下训练收益会降低。',
                '道具是关键时刻的救命稻草。你最多可携带4种不同的道具，可以在比赛开始前主动选择使用：\n\n· 免死金牌：回复20点心态\n· 咖啡：回复25点代码力\n· 小抄：立即获得30分\n· 幸运符：立即获得15分\n\n道具在训练中概率掉落（基础20% + 社交×0.2% + 难度修正）。地狱难度初始赠送一件免死金牌，每年结束时若获得过荣誉，还可随机获得补偿道具。比赛过程中，当代码力或心态极低时，会自动使用对应道具。',
                '每年你将依次参加以下比赛（晋级难度逐级递增）：\n🟢CSP-S（4题·入门）→ 🟢NOIP（4题·入门）→ 🟡省选Day1+Day2（各3题·进阶，加权总分=NOIP×35%+省选×65%）→ 🟠NOI Day1+Day2（各3题·困难，A类+5分）→ 🔴CTT选拔（3题·困难）→ 🔴CST选拔Day1+Day2（各3题·极限）→ 🟣IOI Day1+Day2（各3题·极限）。\n\n每道题包含3个回合：思路与实现、编码与构造、调试与提交。每回合你会从随机卡牌中选择一张打出。比赛过程中如果代码力或心态归零，比赛提前结束，但已得分会保留并正常判定晋级。\n\n越高级的比赛，基础得分越低、消耗越高、对手越强。每场比赛开始前，你还可以选择本场策略：稳扎稳打（稳健卡牌得分+15%）、放手一搏（高风险卡牌得分+20%）、心态调整（跳题回复额外+5心态），系统会基于属性给出推荐。',
                '每回合你会从随机卡牌中选择一张：\n\n· 绿色卡牌（稳健）：稳定得分，消耗适中。如暴力思路、稳健实现。\n· 黄色卡牌（风险）：高分高消耗，可能失败。如正解思路、快速编码。\n· 红色卡牌（事故）：负面效果，如读错题、段错误（最多重选3次）。\n· 💡巧解思路：知识≥80时解锁，消耗更低得分更高。\n· ⭐传说灵感：不同身份有不同触发条件，提供大幅得分且无消耗。\n\n心态和知识影响基础得分。每题上限100分，不会溢出。社交>60时每回合可选卡牌+1。比赛画面顶部有进度条显示当前进度。',
                '比赛中会频繁出现随机事件，考验你的临场决策：手机震动是否偷看、草稿纸用完、监考老师站身后、空格键卡住（可举手求助跳过下回合）、旁边人代码全红、教练门口比手势、突然肚子疼、撞原题直接加分、停电跳过1回合、旁边坐着省队选手、评测系统公告、时间看错、队友扔纸团（社交影响好坏）、心理崩溃边缘、灵感爆发、队友提前交卷（天赋怪额外扣心态）。每个角色还有专属事件。固定回合（第4、7、8、11及最后一题）有特殊剧情，社交高可解锁更好选项。事件收益与惩罚随难度等级变化。',
                '每场比赛结束后的晋级判定：\n· CSP-S：得分>0即可进入NOIP\n· NOIP：达到省选线\n· 省选：NOIP×35%+省选×65%的加权总分决定省队分队，A类NOI总分+5分\n· NOI：总分划分金银铜牌，金牌进CTT\n· CTT：通过线进入CST\n· CST：总分达标入选国家队\n· IOI：结束后游戏结束，展示最终评价\n\n特殊规则：高二时若任意比赛失败，游戏会立即结束并显示原因。进入高三的唯一途径是高二NOI金牌且通过CTT选拔；若高一即通过CTT，则高二直接进入冲刺赛季（CSP-S/NOIP纯参与，之后CST+IOI）。高三赛季中，CSP‑S和NOIP为纯参与，不计成败；之后进行CST和IOI，失败即结束。结局展示最终属性、奖项、隐藏成就、生涯数据、历届NOI成绩以及对手回忆。',
                '游戏全程通过点击选项按钮进行。你可以随时悬停在属性条上查看详细说明。屏幕底部的日志区域会记录最近发生的重要事件，并用不同颜色区分正负面。祝你享受这段旅程！'
            ];

            // ========== 音效 ==========
            let audioCtx = null,
                muted = false,
                volume = 0.07;

            function getCtx() {
                if (!audioCtx) try { audioCtx = new(window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
                if (audioCtx?.state === 'suspended') audioCtx.resume();
                return audioCtx;
            }

            function playTone(f, d, t, v) {
                if (muted) return;
                try {
                    t = t || 'sine';
                    v = v || volume;
                    let c = getCtx();
                    if (!c) return;
                    let o = c.createOscillator(),
                        g = c.createGain();
                    o.type = t;
                    o.frequency.setValueAtTime(f, c.currentTime);
                    g.gain.setValueAtTime(v, c.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + d);
                    o.connect(g);
                    g.connect(c.destination);
                    o.start();
                    o.stop(c.currentTime + d);
                } catch (e) {}
            }

            // ========== 难度 ==========
            const DIFFICULTIES = {
                'easy': { name: '简单', lineMul: 1.05, scoreMul: 0.88, bugAdd: 0.02, duipaiAdd: 0.02, eventProb: 0.35,
                    trainNegProb: 0.45, itemBonus: -0.08, costMul: 1.08, trainGainMul: 0.88, itemEffectMul: 0.94,
                    expMul: 0.88 },
                'normal': { name: '普通', lineMul: 1.12, scoreMul: 0.78, bugAdd: 0.06, duipaiAdd: -0.04, eventProb: 0.42,
                    trainNegProb: 0.57, itemBonus: -0.05, costMul: 1.12, trainGainMul: 0.78, itemEffectMul: 0.88,
                    expMul: 0.78 },
                'hard': { name: '困难', lineMul: 1.3, scoreMul: 0.65, bugAdd: 0.1, duipaiAdd: -0.08, eventProb: 0.48,
                    trainNegProb: 0.72, itemBonus: -0.15, costMul: 1.2, trainGainMul: 0.7, itemEffectMul: 0.8, expMul: 0.7 },
                'hell': { name: '地狱', lineMul: 1.5, scoreMul: 0.5, bugAdd: 0.15, duipaiAdd: -0.15, eventProb: 0.55,
                    trainNegProb: 0.85, itemBonus: -0.2, costMul: 1.3, trainGainMul: 0.6, itemEffectMul: 0.7, expMul: 0.6 }
            };

            function getDiff() { return DIFFICULTIES[G.flags.difficulty] || DIFFICULTIES.normal; }

            function getContestTier(name) {
                if (name.includes('CSP-S')) return 1;
                if (name.includes('NOIP')) return 2;
                if (name.includes('省选')) return 3;
                if (name.includes('NOI')) return 4;
                if (name.includes('CTT')) return 5;
                if (name.includes('CST')) return 6;
                if (name.includes('IOI')) return 7;
                return 1;
            }

            function getTierLabel(tier) { return ['入门', '入门', '进阶', '进阶', '困难', '困难', '极限', '极限'][tier] || '入门'; }

            function getTierScoreMul(tier) { return Math.max(0.45, 1 - (tier - 1) * 0.07); }

            function getTierCostMul(tier) { return 1 + (tier - 1) * 0.06; }

            function getTierEventMul(tier) { return 1 + (tier - 1) * 0.03; }

            function getTierRivalMul(tier) { return 1 + (tier - 1) * 0.08; }

            function getEventMult() {
                switch (G.flags.difficulty) {
                    case 'easy':
                        return { pos: 0.8, neg: 1.0 };
                    case 'normal':
                        return { pos: 0.7, neg: 1.2 };
                    case 'hard':
                        return { pos: 0.55, neg: 1.5 };
                    case 'hell':
                        return { pos: 0.4, neg: 1.8 };
                    default:
                        return { pos: 0.7, neg: 1.2 };
                }
            }

            // ========== 核心：预测训练阶段的实际delta（保证显示与updStat一致） ==========
            function predictTrainDelta(delta) {
                if (delta > 0) {
                    // 正值：受trainGainMul影响
                    let mul = getDiff().trainGainMul || 1;
                    return Math.max(1, Math.floor(delta * mul));
                } else if (delta < 0) {
                    // 负值：社交>50时减半
                    if (G.player.社交 > 50) {
                        return Math.ceil(delta / 2);
                    }
                    return delta;
                }
                return delta;
            }

            // ========== 身份 ==========
            const IDS = [
                { id: '退役边缘人', name: '陈墨', title: '退役边缘人', desc: '去年普及组爆零，背负阴影重新开始。',
                    abi: '心态归零时触发"最后一舞"，3回合内所有代码力消耗减半', weak: '初始心态只有60（容易崩溃）', ic: 75,
                    im: 60, ik: 35, is: 35, sp: 'last_dance' },

                // 在training/prep阶段应用修正
                if (delta > 0 && (G.flags.stage === 'training' || G.flags.stage === 'prep')) {
                    delta = Math.max(1, Math.floor(delta * (getDiff().trainGainMul || 1)));
                } else if (delta < 0 && (G.flags.stage === 'training' || G.flags.stage === 'prep')) {
                    if (G.player.社交 > 50) delta = Math.ceil(delta / 2);
                }
                let mx = (stat === '代码力' && G.flags.identity?.sp === 'code_cap') ? 150 : 100;
                G.player[stat] = clamp(G.player[stat] + delta, 0, mx);
                if (stat === '心态') {
                    if (G.player.心态 < G.flags.lowestMood) { G.flags.lowestMood = G.player.心态;
                        G.flags.lowestMoodName = G.flags.curContest; }
                    if (G.player.心态 < G.flags.hiddenFlags.darkestMood) G.flags.hiddenFlags.darkestMood = G.player.心态;
                }
                if (stat === '社交') {
                    if (G.player.社交 > 80) G.flags.hiddenFlags.社交高 = true;
                    if (G.player.社交 < 40) G.flags.hiddenFlags.社交低 = true;
                }
                if (stat === '心态' && G.player.心态 <= 0 && G.flags.identity?.sp === 'last_dance' && !G.flags
                    .lastDanceTriggered && G.flags.stage === 'contest') {
                    G.flags.lastDanceTriggered = true;

                        action: () => contestRound() }]);
                    return;
                }
                if (stat === '心态' && G.player.心态 < 30 && G.flags.identity?.sp === 'mood_recover' && !G.flags

                    addLog('💪 心态自动回复20点！');

            function addScore(d) {
                if (G.flags.gameOver) return;
                if (d > 0 && G.flags.identity?.sp === 'score_boost') d = Math.floor(d * 1.2);
                const cap = 100;
                if (d < 0) { G.flags.cScore += d;
                    G.flags.cProbScore = Math.max(0, G.flags.cProbScore + d); return; }
                if (G.flags.curProbBonus) d = Math.floor(d * 1.15);
                let room = Math.max(0, cap - Math.max(0, G.flags.cProbScore));
                let add = Math.min(d, room);
                G.flags.cScore += add;
                G.flags.cProbScore += add;
            }

                switch (type) {

                        break;
                    case '幸运符':

                        break;

            function adjustCutoffs() {
                let r = () => Math.floor(Math.random() * 16) - 8;
                let diffMul = getDiff().lineMul;
                let baseCspP = 250;
                if (G.flags.difficulty === 'hard') baseCspP = 300;
                if (G.flags.difficulty === 'hell') baseCspP = 325;
                let base = { cspP: baseCspP, noipG: 200, noiG: 350, cttP: 250, cstP: 300, ioiG: 380 };
                let f = G.flags.fortune;
                if (f === 'small')
                    for (let k in base) base[k] = Math.floor(base[k] * 0.9);
                else if (f === 'big')
                    for (let k in base) base[k] = Math.floor(base[k] * 1.1);
                let pTeamABase;
                switch (G.flags.difficulty) {
                    case 'easy':
                        pTeamABase = 250 + Math.floor(Math.random() * 41);
                        break;
                    case 'normal':
                        pTeamABase = 295 + Math.floor(Math.random() * 36);
                        break;
                    case 'hard':
                        pTeamABase = 335 + Math.floor(Math.random() * 36);
                        break;
                    case 'hell':
                        pTeamABase = 385 + Math.floor(Math.random() * 36);
                        break;
                    default:
                        pTeamABase = 312;
                }
                if (f === 'small') pTeamABase = Math.floor(pTeamABase * 0.9);
                else if (f === 'big') pTeamABase = Math.floor(pTeamABase * 1.1);
                G.cutoffs = {
                    cspP: clamp(Math.floor(base.cspP * diffMul) + r(), 200, 320),
                    noipG: clamp(Math.floor(base.noipG * diffMul) + r(), 160, 260),
                    pTeamA: pTeamABase,
                    noiG: clamp(Math.floor(base.noiG * diffMul) + r(), 300, 420),
                    cttP: clamp(Math.floor(base.cttP * diffMul) + r(), 200, 320),
                    cstP: clamp(Math.floor(base.cstP * diffMul) + r(), 250, 380),
                    ioiG: clamp(Math.floor(base.ioiG * diffMul) + r(), 320, 450)
                };
            }

            function getCSPAward(s) { let c = G.cutoffs; if (s >= c.cspP) return '🥇CSP-S一等奖'; if (s >= c.cspP * 0.75)
                    return '🥈CSP-S二等奖'; if (s >= c.cspP * 0.4) return '🥉CSP-S三等奖'; return '未获奖'; }

            function getNOIPAward(s) { let c = G.cutoffs; if (s >= c.noipG) return '🥇NOIP一等奖'; if (s >= c.noipG * 0.75)
                    return '🥈NOIP二等奖'; if (s >= c.noipG * 0.4) return '🥉NOIP三等奖'; return '未获奖'; }

            function getProvAward(t) { let c = G.cutoffs; if (t >= c.pTeamA) return '🌟 入选省队A类 (NOI+5分)'; if (t >= c
                    .pTeamA * 0.85) return '🌟 入选省队B类'; if (t >= c.pTeamA * 0.7) return '🌟 入选省队C类'; return '❌ 未入选省队'; }

            function getNOIAward(t) { let c = G.cutoffs; if (t >= c.noiG) return '🥇NOI金牌'; if (t >= c.noiG * 0.8)
                    return '🥈NOI银牌'; if (t >= c.noiG * 0.5) return '🥉NOI铜牌'; return '未获奖'; }

            function getCTTAward(s) { return s >= G.cutoffs.cttP ? '✅CTT选拔通过' : '❌CTT选拔未通过'; }

            function getCSTAward(t) { return t >= G.cutoffs.cstP ? '🇨🇳入选国家队' : '未入选国家队'; }

            function getIOIAward(t) { let c = G.cutoffs; if (t >= c.ioiG) return '🥇IOI金牌'; if (t >= c.ioiG * 0.8)
                    return '🥈IOI银牌'; if (t >= c.ioiG * 0.5) return '🥉IOI铜牌'; return '未获奖'; }

            function unlockAch(n) { if (!G.achievements.includes(n)) { G.achievements.push(n);
                    addLog('🏆 成就解锁：' + n);
                    showFloatText('🏆 ' + n, '#f1c40f'); } }

            function unlockHidden(n) { if (!G.hiddenAch.includes(n)) { G.hiddenAch.push(n);
                    addLog('✨ 隐藏成就：' + n);
                    showFloatText('✨ ' + n, '#e84393'); } }

            function addAward(awardText) { if (awardText && !awardText.includes('未获奖') && !awardText.includes('未入选') && !
                    awardText.includes('未通过') && !awardText.includes('未获')) G.awards.push(awardText); }

            // ========== 训练 ==========
            function prologuePrep() {
                G.flags.stage = 'prep';
                let yn = ['', '高一', '高二', '高三'];
                let ft = '';
                if (G.flags.fortune === 'lucky') ft = '🍀 幸运年';
                else if (G.flags.fortune === 'disaster') ft = '⛈️ 灾年';
                else if (G.flags.fortune === 'small') ft = '📉 小年';
                else ft = '📈 大年';
                showScene('📅' + yn[G.flags.year] + '·赛前准备 (5次训练)\n' + ft, [{ text: '开始训练', action: () => freeTraining(
                        5, cspContest) }]);
            }

            function freeTraining(cnt, next) { G.flags.stage = 'training';
                G.flags.trainingCount = 0;
                G.flags.trainingMax = cnt;
                G.flags.nextCb = next;
                trainingStep(); }

            function nextTraining() { if (G.flags.trainingCount >= G.flags.trainingMax) { let cb = G.flags.nextCb; if (cb)
                        cb(); } else trainingStep(); }

            function trainingStep() {
                if (G.flags.trainingCount >= G.flags.trainingMax) { let cb = G.flags.nextCb; if (cb) cb(); return }
                G.flags.trainingCount++;
                playTone(440, 0.07, 'triangle');
                let itemProb = 0.2 + G.player.社交 * 0.002 + getDiff().itemBonus;
                if (Math.random() < itemProb && G.flags.items.length < 4) {
                    let pool = ['免死金牌', '小抄', '咖啡', '幸运符'];
                    let available = pool.filter(item => !G.flags.items.includes(item));
                    if (available.length > 0) {
                        let got = available[Math.floor(Math.random() * available.length)];
                        G.flags.items.push(got);
                        addLog('🎁获得道具：' + got);
                        showFloatText('🎒 获得 ' + got, '#1abc9c');
                    }
                }
                showTrainingOptions();
            }

            function showTrainingOptions() {
                let diff = getDiff(),
                    gainMul = diff.trainGainMul || 1;
                // 使用predictTrainDelta来保证显示与实际一致
                let sK = predictTrainDelta(5),
                    sC = predictTrainDelta(2),
                    sM = predictTrainDelta(-1);
                let dK = predictTrainDelta(8),
                    dM = predictTrainDelta(-3);
                let spM = predictTrainDelta(6),
                    spC = predictTrainDelta(1);
                let soS = predictTrainDelta(6),
                    soK = predictTrainDelta(3 + (G.player.社交 > 50 ? 2 : 0));
                let slC = predictTrainDelta(7),
                    slM = predictTrainDelta(3);
                let retireText;
                if (G.flags.identity?.id === '退役边缘人') {
                    retireText = '📝看退役记 (心态+' + predictTrainDelta(8) + ')';
                } else {
                    retireText = '📝看退役记 (心态' + predictTrainDelta(-3) + ', 知识+' + predictTrainDelta(3) + ', 代码力+' +
                        predictTrainDelta(3) + ')';
                }
                let opts = [
                    { text: '📚刷题巩固 (知识+' + sK + ' 代码力+' + sC + ' 心态' + sM + ')', action: () => { updStat('知识',
                                5);
                            updStat('代码力', 2);
                            updStat('心态', -1);
                            G.flags.diary.push('刷题巩固');
                            afterTrainAction(); } },
                    { text: '🧠钻研算法 (知识+' + dK + ' 心态' + dM + ')', action: () => { updStat('知识', 8);
                            updStat('心态', -3);
                            G.flags.diary.push('钻研算法');
                            afterTrainAction(); } },
                    { text: '🏃运动放松 (心态+' + spM + ' 代码力+' + spC + ')', action: () => { updStat('心态', 6);
                            updStat('代码力', 1);
                            G.flags.diary.push('运动放松');
                            afterTrainAction(); } },
                    { text: '💬与同学交流 (社交+' + soS + ' 知识+' + soK + ')', action: () => { updStat('社交', 6);
                            updStat('知识', 3 + (G.player.社交 > 50 ? 2 : 0));
                            G.flags.diary.push('与同学交流');
                            afterTrainAction(); } },
                    { text: '💤保证睡眠 (代码力+' + slC + ' 心态+' + slM + ')', action: () => { updStat('代码力', 7);
                            updStat('心态', 3);
                            G.flags.diary.push('保证睡眠');
                            afterTrainAction(); } },
                    { text: retireText, action: () => { if (G.flags.identity?.id === '退役边缘人') { updStat('心态',
                                8);
                                G.flags.diary.push('看退役记'); } else { updStat('心态', -3);
                                updStat('知识', 3);
                                updStat('代码力', 3);
                                G.flags.diary.push('看退役记'); }
                            afterTrainAction(); } },
                    { text: '📖查看训练日记', action: () => showDiary() }
                ];
                showScene('训练 (' + G.flags.trainingCount + '/' + G.flags.trainingMax + ')：', opts);
            }

            function afterTrainAction() {
                let rand = Math.random();
                let m = getEventMult();
                if (rand < getDiff().trainNegProb * 0.6) {
                    let types = ['study', 'deep', 'social', 'sleep', 'retire'];
                    let type = types[Math.floor(Math.random() * types.length)];
                    let evs = TRAIN_EV[type];
                    if (evs) {
                        let ev = evs[Math.floor(Math.random() * evs.length)];
                        G.flags.diary.push(ev.text);
                        if (ev.choices) {
                            showScene('⚡额外随机事件\n' + ev.text, ev.choices.map(c => ({ text: c.text(m), action: () => c
                                    .action(() => nextTraining(), m) })));
                        } else {
                            ev.eff(m);
                            showScene('⚡额外随机事件\n' + ev.text + '\n' + ev.txt(m), [{ text: '继续', action: () =>
                                    nextTraining() }]);
                        }
                        return;
                    }
                } else if (rand < 0.55) {
                    let ev = RIVAL_EV[Math.floor(Math.random() * RIVAL_EV.length)];
                    showScene('⚡对手互动\n' + ev.text, ev.choices.map(c => ({ text: c.text(m), action: () => c.action(() =>
                            nextTraining(), m) })));
                    return;
                } else if (G.flags.identity && CHAR_TRAIN_EV[G.flags.identity.id] && Math.random() < 0.25) {
                    let ev = CHAR_TRAIN_EV[G.flags.identity.id][Math.floor(Math.random() * CHAR_TRAIN_EV[G.flags.identity
                        .id].length)];
                    G.flags.diary.push(ev.text);
                    showScene('⚡角色专属\n' + ev.text + '\n' + ev.txt(m), [{ text: '继续', action: () => { ev.eff(m);
                            nextTraining(); } }]);
                    return;
                }
                nextTraining();
            }

            function showDiary() {
                let all = G.flags.diary.length ? G.flags.diary.join('\n') : '暂无训练日记。';
                showScene('📖 训练日记\n\n' + all, [{ text: '返回', action: showTrainingOptions }]);
            }

            // ========== 比赛流程 ==========
            function cspContest() { G.flags.contestPlayed.csp = true;
                startContest('CSP-S', 4, '', s => { G.flags.scores.csp = s;
                    let a = getCSPAward(s);
                    addAward(a); if (s > 0) { showScene('🎉CSP-S：' + s + '分\n' + a, [{ text: '进入NOIP训练', action: () =>
                            freeTraining(3, noipContest) }]); } else { if (G.flags.year >= 2) endGame(
                        '高二CSP-S爆零');
                    else showScene('💔CSP-S爆零', [{ text: '明年再战', action: () => advanceYear() }, { text: '退役',
                        action: () => endGame('退役') }]) } }) }

            function noipContest() { G.flags.contestPlayed.noip = true;
                startContest('NOIP', 4, '省级联赛', s => { G.flags.scores.noip = s;
                    let a = getNOIPAward(s);
                    addAward(a); if (s >= G.cutoffs.noipG * 0.75) { showScene('🏅NOIP：' + s + '分\n' + a, [{ text: '进入省选训练',
                            action: () => freeTraining(3, provDay1) }]) } else { if (G.flags.year >= 2) endGame(
                        '高二NOIP未晋级');
                    else showScene('📉NOIP未晋级', [{ text: '明年再战', action: () => advanceYear() }, { text: '退役',
                        action: () => endGame('退役') }]) } }) }

            function provDay1() { G.flags.contestPlayed.pd1 = true;
                startContest('省选Day1', 3, '省队选拔', s => { G.flags.scores.pd1 = s;
                    showScene('🌟省选Day1 得分 ' + s, [{ text: '进入Day2', action: () => provDay2() }]) }) }

            function provDay2() { G.flags.contestPlayed.pd2 = true;
                startContest('省选Day2', 3, '最后的机会', s => { G.flags.scores.pd2 = s;
                    let weighted = Math.floor(G.flags.scores.noip * 0.35 + (G.flags.scores.pd1 + s) * 0.65);
                    let a = getProvAward(weighted);
                    addAward(a); if (a.includes('A类')) G.flags.noiBonus = 5; if (!a.includes('未入选')) { showScene(
                        '🌟省选加权总分 ' + weighted + '\n' + a, [{ text: '备战NOI', action: () => freeTraining(3,
                            noiDay1) }]) } else { if (G.flags.year >= 2) endGame('高二省选未入选');
                    else showScene('💧省选加权总分 ' + weighted + '\n' + a, [{ text: '明年再战', action: () =>
                            advanceYear() }, { text: '退役', action: () => endGame('退役') }]) } }) }

            function noiDay1() { G.flags.contestPlayed.noi = true;
                startContest('NOI Day1', 3, '全国决赛', s => { G.flags.scores.noi = s;
                    showScene('🌙NOI Day1 得分 ' + s + '。回到寝室，室友看起来有些不安。', [{ text: '和他聊聊', action: () => { if (G
                                .player.社交 > 50) { updStat('心态', 10);
                                addLog('室友听了你的安慰，放松了许多。心态+10'); } else { updStat('心态', -5);
                                addLog('你们聊得有些尴尬，室友更加焦虑了。心态-5'); }
                            showScene('你决定好好休息，迎接明天的NOI Day2。', [{ text: '进入Day2', action: () =>
                                noiDay2() }]); } }, { text: '让他安静一会', action: () => { updStat('心态', 2);
                            addLog('你选择让他独自待着，自己也开始准备明天的比赛。');
                            showScene('你决定好好休息，迎接明天的NOI Day2。', [{ text: '进入Day2', action: () =>
                                noiDay2() }]); } }]); }) }

            function noiDay2() { G.flags.contestPlayed.noi = true;
                startContest('NOI Day2', 3, '最后一战', s => { let t = G.flags.scores.noi + s + G.flags.noiBonus;
                    G.flags.scores.noi = t;
                    G.flags.scores.noiHistory.push({ year: G.flags.year, score: t });
                    let a = getNOIAward(t);
                    addAward(a); if (t >= G.cutoffs.noiG) { unlockAch('NOI金牌');
                        showScene('🥇NOI总分 ' + t + '\n' + a, [{ text: '进入CTT训练', action: () => freeTraining(3,
                                cttContest) }]) } else { if (G.flags.year >= 2) endGame('高二NOI未获金牌');
                    else showScene('NOI总分 ' + t + '\n' + a, [{ text: '明年再战', action: () => advanceYear() },
                        { text: '退役', action: () => endGame('退役') }]) } }) }

            function cttContest() { G.flags.contestPlayed.ctt = true;
                startContest('CTT选拔', 3, '国家集训队选拔', s => { G.flags.scores.ctt = s;
                    let a = getCTTAward(s);
                    addAward(a); if (s >= G.cutoffs.cttP) { if (G.flags.year === 1) { G.flags.year = 2;
                        G.flags.seniorMode = true;
                        showScene('🎉 高一通过CTT！\n明年进入冲刺赛季', [{ text: '进入冲刺赛季', action: () =>
                            seniorFlow() }]); } else if (G.flags.year === 2) { G.flags.year = 3;
                        G.flags.seniorMode = true;
                        seniorFlow(); } else { advanceYear(); } } else { if (G.flags.year >= 2) endGame(
                        'CTT未通过');
                    else showScene('📉CTT未通过', [{ text: '明年再战', action: () => advanceYear() }, { text: '退役',
                        action: () => endGame('退役') }]) } }) }

            function advanceYear() {
                if (G.flags.difficulty === 'hell' && G.awards.length > 0 && G.flags.items.length < 4) {
                    let pool = ['免死金牌', '小抄', '咖啡', '幸运符'];
                    let available = pool.filter(item => !G.flags.items.includes(item));
                    if (available.length > 0) {
                        let got = available[Math.floor(Math.random() * available.length)];
                        G.flags.items.push(got);
                        addLog('🎁年度荣誉补偿：获得' + got);
                    }
                }
                if (G.flags.year >= 3) { G.flags.year = 3;
                    G.flags.seniorMode = true;
                    seniorFlow(); return }
                G.flags.year++;
                G.player.代码力 = clamp(Math.floor(G.player.代码力 * 0.8) + 15, 0, 150);
                G.player.心态 = Math.floor(G.player.心态 * 0.8);
                G.player.知识 = Math.floor(G.player.知识 * 0.8);
                G.player.社交 = Math.floor(G.player.社交 * 0.8);
                adjustCutoffs();
                prologuePrep();
            }

            function seniorFlow() {
                let yearLabel = G.flags.year === 2 ? '高二' : '高三';
                showScene('📅 ' + yearLabel + '·国家队冲刺赛季', [{ text: '开始训练', action: () => freeTraining(5, () =>
                        seniorCSPContest()) }]);
            }

            function seniorCSPContest() { G.flags.contestPlayed.csp = true;
                startContest('CSP-S', 4, '（纯参与）', s => { showScene('CSP-S 得分：' + s, [{ text: 'NOIP训练', action: () =>
                        freeTraining(3, () => seniorNOIPContest()) }]); }); }

            function seniorNOIPContest() { G.flags.contestPlayed.noip = true;
                startContest('NOIP', 4, '（纯参与）', s => { showScene('NOIP 得分：' + s, [{ text: '进入CST训练', action: () =>
                        freeTraining(3, () => cstDay1()) }]); }); }

            function cstDay1() { G.flags.contestPlayed.cst = true;
                startContest('CST Day1', 3, '国家队选拔', s => { G.flags.scores.cst = s;
                    showScene('🏁CST Day1 得分 ' + s, [{ text: '进入Day2', action: () => cstDay2() }]) }) }

            function cstDay2() { G.flags.contestPlayed.cst = true;
                startContest('CST Day2', 3, '最后一关', s => { let t = G.flags.scores.cst + s;
                    let a = getCSTAward(t);
                    addAward(a); if (t >= G.cutoffs.cstP) { showScene('🇨🇳入选国家队！总分 ' + t, [{ text: '备战IOI', action: () =>
                            freeTraining(3, ioiDay1) }]) } else endGame('CST未通过') }) }

            function ioiDay1() { G.flags.contestPlayed.ioi = true;
                startContest('IOI Day1', 3, '世界舞台', s => { G.flags.scores.ioi = s;
                    showScene('🌍IOI Day1 得分 ' + s, [{ text: '进入Day2', action: () => ioiDay2() }]) }) }

            function ioiDay2() { G.flags.contestPlayed.ioi = true;
                startContest('IOI Day2', 3, '巅峰之战', s => { let t = G.flags.scores.ioi + s;
                    let a = getIOIAward(t);
                    addAward(a); if (t >= G.cutoffs.ioiG) unlockAch('IOI金牌');
                    endGame('IOI圆满落幕\n总分：' + t + '\n' + a); }) }

            function selectStrategy(next) {
                let p = G.player;
                let recommend = '';
                if (G.player.代码力 < 40) recommend = ' 💡推荐：稳扎稳打（代码力低，稳健卡牌不易翻车）';
                else if (G.player.知识 > 70) recommend = ' 💡推荐：放手一搏（知识高，黄色卡牌收益大）';
                else if (G.player.心态 < 40) recommend = ' 💡推荐：心态调整（心态低，跳题回复更多）';
                showScene('🎯 选择本场策略：' + recommend, [
                    { text: '稳扎稳打（绿色+15%）', action: () => { G.flags.strategy = 'steady';
                        next(); } },
                    { text: '放手一搏（黄色+20%）', action: () => { G.flags.strategy = 'risky';
                        next(); } },
                    { text: '心态调整（跳题额外+5心态）', action: () => { G.flags.strategy = 'mood';
                        next(); } }
                ]);
            }

            function startContest(name, probs, desc, next) {
                G.flags.stage = 'contest';
                G.flags.curContest = name;
                G.flags.cMaxP = probs;
                G.flags.round = 0;
                if (G.flags.identity?.sp === 'mood_recover') { G.flags.cScore = -10; } else { G.flags.cScore = 0; }
                G.flags.cProbScore = 0;
                G.flags.nextProbBonus = false;
                G.flags.curProbBonus = false;
                G.flags.nextCb = next;
                G.flags.rerollCount = 0;
                G.flags.lastAction = null;
                G.flags.contestTier = getContestTier(name);
                G.flags.lastDanceTriggered = false;
                G.flags.lastDanceTurns = 0;
                G.flags.lastWasEvent = false;
                showScene('🏁 ' + name + ' (' + getTierLabel(G.flags.contestTier) + ')\n' + desc + '\n题目数：' + probs +
                    '题', [{ text: '开始比赛', action: () => selectStrategy(() => showItemUseOptions(() =>
                        contestRound())) }]);
            }

            // ========== 核心比赛逻辑 ==========
            function showCardsForCurrentRound() {
                let m = getEventMult();
                if (G.player.社交 > 60 && Math.random() < 0.25) { addScore(Math.floor(5 * m.pos));
                    addLog('🤝 队友的信任让你更有信心，额外+' + Math.floor(5 * m.pos) + '分'); }
                let envText = getActionEnv(G.flags.lastAction);
                let diff = getDiff(),
                    costMul = diff.costMul || 1,
                    hc = G.flags.lastDanceTurns > 0,
                    id = G.flags.identity;
                let tier = G.flags.contestTier;
                let tierScoreMul = getTierScoreMul(tier),
                    tierCostMul = getTierCostMul(tier);
                let c8 = Math.round(8 * costMul * tierCostMul),
                    c15 = Math.round(15 * costMul * tierCostMul),
                    c12 = Math.round(12 * costMul * tierCostMul),
                    c20 = Math.round(20 * costMul * tierCostMul);
                let moodMul = G.player.心态 > 70 ? 1.05 : G.player.心态 < 30 ? 0.85 : 1;
                let safeMul = (G.flags.strategy === 'steady') ? 1.15 : 1,
                    riskMul = (G.flags.strategy === 'risky') ? 1.2 : 1;
                let jumpMoodBase = 10,
                    jumpMoodBonus = (G.flags.strategy === 'mood') ? 5 : 0;
                let jumpMood = jumpMoodBase + jumpMoodBonus;
                let phase = G.flags.round % 3,
                    problemNum = Math.floor(G.flags.round / 3) + 1;
                let cards = [];
                if (phase === 0) {
                    let b1 = Math.floor(30 * diff.scoreMul * moodMul * tierScoreMul * safeMul),
                        b2 = Math.floor(75 * diff.scoreMul * moodMul * tierScoreMul * riskMul);
                    cards = [
                        { text: '🟢暴力思路 (+' + b1 + '分, 代码力-' + c8 + ')', action: () => { addScore(b1);
                                updStat('代码力', hc ? -Math.round(c8 / 2) : -c8);
                                G.flags.lastAction = 'brute';
                                afterCard(); } },
                        { text: '🟡正解思路 (+' + b2 + '分, 代码力-' + c15 + ')', action: () => { addScore(b2);
                                updStat('代码力', hc ? -Math.round(c15 / 2) : -c15);
                                G.flags.lastAction = 'correct';
                                afterCard(); } },
                        { text: '🟡跳题 (0分, 心态+' + jumpMood + ')', action: () => { skipProblem(jumpMood); } }
                    ];
                    if (G.player.知识 >= 80) { let cb = Math.floor(85 * diff.scoreMul * moodMul * tierScoreMul * safeMul);
                        cards.push({ text: '💡巧解思路 (+' + cb + '分, 代码力-10)', action: () => { addScore(cb);
                                updStat('代码力', hc ? -5 : -10);
                                G.flags.lastAction = 'correct';
                                afterCard(); } }) }
                } else if (phase === 1) {
                    let b1 = Math.floor(35 * diff.scoreMul * moodMul * tierScoreMul * safeMul),
                        b2 = Math.floor(45 * diff.scoreMul * moodMul * tierScoreMul * riskMul);
                    let bugProb = 0.3 + diff.bugAdd;
                    cards = [
                        { text: '🟢稳健实现 (+' + b1 + '分, 代码力-' + c12 + ')', action: () => { addScore(b1);
                                updStat('代码力', hc ? -Math.round(c12 / 2) : -c12);
                                G.flags.lastAction = 'stable';
                                afterCard(); } },
                        { text: '🟡快速编码 (+' + b2 + '分, 代码力-' + c20 + ', 可能出bug)', action: () => { let s = b2; if (
                                    Math.random() < bugProb) s -= Math.floor(20 * m.neg);
                                addScore(s);
                                updStat('代码力', hc ? -Math.round(c20 / 2) : -c20);
                                G.flags.lastAction = 'fast';
                                afterCard(); } },
                        { text: '🟡跳题 (0分, 心态+' + jumpMood + ')', action: () => { skipProblem(jumpMood); } }
                    ];
                } else {
                    let dp = clamp(0.9 + diff.duipaiAdd, 0.2, 1),
                        rerollLeft = 3 - G.flags.rerollCount;
                    let segChoices = [
                        { text: '🟢简单测试 (+' + Math.floor(10 * diff.scoreMul * tierScoreMul * safeMul) + '分)',
                            action: () => { addScore(Math.floor(10 * diff.scoreMul * tierScoreMul * safeMul));
                                G.flags.lastAction = 'test';
                                afterCard(); } },
                        { text: '🟡写对拍 (代码力-' + c15 + ', ' + Math.floor(dp * 100) + '% +' + Math.floor(25 * diff
                                .scoreMul * tierScoreMul * riskMul) + '分)', action: () => { updStat('代码力', hc ? -
                                    Math.round(c15 / 2) : -c15); if (Math.random() < dp) addScore(Math.floor(
                                    25 * diff.scoreMul * tierScoreMul * riskMul));
                                G.flags.lastAction = 'check';
                                afterCard(); } },
                        { text: '🟡跳题 (0分, 心态+' + jumpMood + ')', action: () => { skipProblem(jumpMood); } }
                    ];
                    if (rerollLeft > 0) { segChoices.push({ text: '🔴段错误 (心态-' + Math.floor(10 * m.neg) +
                                ', 重选本回合, 剩余' + rerollLeft + '次)', action: () => { updStat('心态', -Math.floor(10 *
                                    m.neg)); if (Math.random() < 0.3) { addScore(Math.floor(5 * m.pos));
                                    addLog('🔍排查段错误时意外发现隐藏bug，本题+' + Math.floor(5 * m.pos) + '分') }
                                G.flags.rerollCount++;
                                G.flags.lastAction = 'segment';
                                G.flags.skipNextRound = true;
                                afterCard(); } }); }
                    cards = segChoices;
                }
                let lc = 0;
                if (G.player.社交 > 60 && G.player.知识 > 40) lc = 0.08;
                if (id?.id === '刷题机器' && G.player.代码力 > 120) lc = 0.12;
                if (id?.id === '天赋怪' && G.player.知识 > 60) lc = 0.12;
                if (id?.id === '退役边缘人' && G.player.心态 < 20) lc = 0.18;
                lc = Math.max(0.03, lc - (tier - 1) * 0.008);
                if (Math.random() < lc) cards.push({ text: '⭐传说灵感 (+' + Math.floor(80 * tierScoreMul * m.pos) +
                        '分, 心态+10, 无消耗)', action: () => { addScore(Math.floor(80 * tierScoreMul * m.pos));
                        updStat('心态', Math.floor(10 * m.pos));
                        G.flags.lastAction = 'legend';
                        playTone(880, 0.12);
                        showFloatText('⭐ 传说灵感！', '#e84393');
                        addLog('✨ 灵光一闪！');
                        afterCard(); } });
                if (id?.id === '刷题机器' && Math.random() < 0.3) { cards.push({ text: '🔴读错题 (心态-' + Math.floor(20 * m
                            .neg) + ', +' + Math.floor(10 * m.pos) + '分)', action: () => { updStat('心态', -Math
                            .floor(20 * m.neg));
                        addScore(Math.floor(10 * m.pos));
                        G.flags.hiddenFlags.grinderClean++;
                        G.flags.lastAction = 'read';
                        afterCard(); } }); }
                if (!cards.some(c => c.text.includes('跳题'))) cards.push({ text: '🟡跳题 (0分, 心态+' + jumpMood + ')',
                    action: () => { skipProblem(jumpMood); } });
                if (G.player.代码力 < 30) {
                    let jumpCard = cards.find(c => c.text.includes('跳题'));
                    let otherCards = cards.filter(c => !c.text.includes('跳题'));
                    if (otherCards.length > 0) {
                        let randomCard = otherCards[Math.floor(Math.random() * otherCards.length)];
                        cards = jumpCard ? [jumpCard, randomCard] : [randomCard];
                    } else { cards = jumpCard ? [jumpCard] : []; }
                }
                cards = (G.player.社交 > 60) ? cards.slice(0, 4) : cards.slice(0, 3);
                showScene('📝第' + problemNum + '题 · ' + ['思路与实现', '编码与构造', '调试与提交'][phase] + '\n' + envText +
                    '\n当前总分：' + G.flags.cScore + ' (本题' + G.flags.cProbScore + '/100)', cards, true);
            }

            function afterCard() {
                let m = getEventMult();
                if (G.flags.round === 3) {
                    let choices = [
                        { text: "👀偷看 (50%分数+" + Math.floor(20 * m.pos) + "，50%被发现心态-" + Math.floor(15 * m.neg) +
                                ")", action: () => { if (Math.random() < 0.5) { addScore(Math.floor(20 * m.pos)); } else {
                                        updStat('心态', -Math.floor(15 * m.neg)); }
                                    afterSpecial(); } },
                        { text: "🙈专注自己 (心态+" + Math.floor(5 * m.pos) + "，代码力+" + Math.floor(3 * m.pos) + ")",
                            action: () => { updStat('心态', Math.floor(5 * m.pos));
                                updStat('代码力', Math.floor(3 * m.pos));
                                afterSpecial(); } }
                    ];
                    if (G.player.社交 > 60) choices.push({ text: "💬和旁边人交流思路 (知识+" + Math.floor(5 * m.pos) + "，心态+" +
                            Math.floor(3 * m.pos) + ")", action: () => { updStat('知识', Math.floor(5 * m.pos));
                                updStat('心态', Math.floor(3 * m.pos));
                                afterSpecial(); } });
                    showScene("👀 第4回合 · 诱惑\n\n你旁边的人开始对拍，他的屏幕上一排绿色AC。你忍不住想看。", choices);
                    return;
                }
                if (G.flags.round === 6) {
                    showScene("🧮 第7回合 · 自我怀疑\n\n你按了一下计算器。就算后面全满分，总分也够呛。", [
                        { text: "🎯算分崩溃 (心态-" + Math.floor(15 * m.neg) + "，剩余回合分数+20%)", action: () => {
                                updStat('心态', -Math.floor(15 * m.neg));
                                afterSpecial(); } },
                        { text: "🧘不再想分数 (心态+" + Math.floor(10 * m.pos) + ")", action: () => { updStat('心态', Math
                                    .floor(10 * m.pos));
                                afterSpecial(); } }
                    ]);
                    return;
                }
                if (G.flags.round === 7 && G.player.代码力 < 30) {
                    let choices8 = [
                        { text: "💪硬写 (代码力-" + Math.floor(20 * m.neg) + "，本题分数+" + Math.floor(25 * m.pos) + ")",
                            action: () => { updStat('代码力', -Math.floor(20 * m.neg));
                                addScore(Math.floor(25 * m.pos));
                                afterSpecial(); } },
                        { text: "🚰去洗把脸 (跳过本回合，代码力+" + Math.floor(40 * m.pos) + ")", action: () => { updStat(
                                    '代码力', Math.floor(40 * m.pos));
                                skipToNextRound(); } }
                    ];
                    if (G.player.社交 > 50) choices8.push({ text: "📲给队友发求救信号 (跳过本回合，代码力+" + Math.floor(20 * m
                            .pos) + "，心态+" + Math.floor(5 * m.pos) + ")", action: () => { updStat('代码力', Math
                                .floor(20 * m.pos));
                            updStat('心态', Math.floor(5 * m.pos));
                            skipToNextRound(); } });
                    showScene("💥 第8回合 · 崩溃\n\n你盯着屏幕，那些字母突然变得陌生。", choices8);
                    return;
                }
                if (G.flags.round === 10) {
                    showScene("⏳ 第11回合 · 抉择\n\n只剩最后半小时。你还有一题完全没动，但上一题的bug还在。", [
                        { text: "🔧死磕上一题 (失去本回合，上一题分数×1.5)", action: () => { let newProb = Math.min(100, Math
                                    .floor(G.flags.cProbScore * 1.5));
                                G.flags.cScore += newProb - G.flags.cProbScore;
                                G.flags.cProbScore = newProb;
                                afterSpecial(); } },
                        { text: "🆕放弃debug，开新题 (30%概率爆零，否则+" + Math.floor(40 * m.pos) + ")", action: () => { if (
                                    Math.random() < 0.3) addScore(-Math.floor(30 * m.neg));
                                else addScore(Math.floor(40 * m.pos));
                                afterSpecial(); } },
                        { text: "📄交白卷，保心态 (心态+" + Math.floor(30 * m.pos) + "，分数不变)", action: () => { updStat(
                                    '心态', Math.floor(30 * m.pos));
                                afterSpecial(); } }
                    ]);
                    return;
                }
                if (G.flags.round === G.flags.cMaxP * 3 - 1 && Math.random() < 0.05) {
                    showScene("🌟 最后一题的奇迹\n\n这道题，你两周前在洛谷做过一模一样的。", [
                        { text: "拿下满分！ (本题满分，心态+" + Math.floor(20 * m.pos) + "，+" + Math.floor(60 * m.pos) + "分)",
                            action: () => { addScore(Math.floor(60 * m.pos));
                                updStat('心态', Math.floor(20 * m.pos));
                                afterSpecial(); } }
                    ]);
                    return;
                }
                afterSpecial();
            }

            function afterSpecial() {
                let m = getEventMult();
                let tier = G.flags.contestTier;
                let eventProb = getDiff().eventProb * getTierEventMul(tier);
                if (G.flags.lastWasEvent) eventProb *= 0.3;
                if (Math.random() < eventProb) {
                    let ev;
                    if (G.flags.fortune === 'lucky' && Math.random() < 0.3) { ev = RAND_EV[7]; } else if (G.flags
                        .fortune === 'disaster' && Math.random() < 0.6) { let negEvs = RAND_EV.filter(e => e
                            .negative);
                        ev = negEvs[Math.floor(Math.random() * negEvs.length)]; } else { if (G.flags.identity?.id &&
                            Math.random() < 0.3) ev = ID_EV[G.flags.identity.id]; if (!ev) ev = RAND_EV[Math.floor(
                            Math.random() * RAND_EV.length)]; }
                    G.flags.lastWasEvent = true;
                    showScene('⚡随机事件\n' + ev.text, ev.choices.map(c => ({ text: typeof c.text === 'function' ? c
                            .text(m) : c.text, action: () => { c.action(() => doNext(), m); } })));
                    return;
                }
                G.flags.lastWasEvent = false;
                doNext();
            }

            function skipToNextRound() {
                G.flags.round++;
                G.flags.rerollCount = 0;
                contestRound();
            }

            function doNext() {
                if (G.flags.lastDanceTurns > 0) G.flags.lastDanceTurns--;
                if (!G.flags.skipNextRound) {
                    G.flags.round++;
                    G.flags.rerollCount = 0;
                } else { G.flags.skipNextRound = false; }
                contestRound();
            }

            function skipProblem(jumpMood) {
                updStat('心态', jumpMood);
                G.flags.lastAction = 'skip';
                G.flags.round = (Math.floor(G.flags.round / 3) + 1) * 3;
                contestRound();
            }

            function contestRound() {
                if (G.flags.gameOver) return;
                if (!G.flags.lastDanceTriggered) {
                    if (G.player.代码力 <= 15 && G.flags.items.includes('咖啡')) { useItem('咖啡');
                        addLog('☕ 代码力不足，自动使用咖啡'); }
                    if (G.player.心态 <= 15 && G.flags.items.includes('免死金牌') && G.flags.identity?.sp !==
                        'last_dance') { useItem('免死金牌');
                        addLog('🛡️ 心态危急，自动使用免死金牌'); }
                }
                if (G.player.代码力 <= 0 && !G.flags.lastDanceTriggered) { addLog('代码力耗尽，比赛结束。');
                    endContest(); return }
                if (G.player.心态 <= 0 && !G.flags.lastDanceTriggered && G.flags.identity?.sp !== 'last_dance') { addLog(
                        '心态崩溃，当场退赛。');
                    endContest(); return }
                if (G.flags.lastDanceTurns === 0 && G.flags.lastDanceTriggered) { addLog('最后一舞余烬熄灭，强制退赛。');
                    endContest(); return }
                let maxRounds = G.flags.cMaxP * 3; if (G.flags.round >= maxRounds) { endContest(); return }
                let phase = G.flags.round % 3; if (phase === 0) { G.flags.rerollCount = 0;
                    G.flags.cProbScore = 0;
                    G.flags.curProbBonus = G.flags.nextProbBonus;
                    G.flags.nextProbBonus = false }
                if (G.player.心态 < 20 && !G.flags.lastDanceTriggered) { updStat('心态', -5);
                    addLog('⚡退役诅咒：心态低于20，每回合额外-5心态。') }
                G.flags.skipNextRound = false;
                showCardsForCurrentRound();
            }

            function endContest() {
                if (G.flags.gameOver) return;
                let s = G.flags.cScore,
                    next = G.flags.nextCb;
                if (s > G.flags.bestScore) { G.flags.bestScore = s;
                    G.flags.bestScoreName = G.flags.curContest }
                let tier = G.flags.contestTier;
                let rivalMul = getTierRivalMul(tier);
                let maxPossible = G.flags.cMaxP * 100;
                G.flags.rivals.forEach(r => {
                    let base = Math.min(s, maxPossible); if (base <= 0) base = Math.floor(maxPossible * 0.3);
                    let ratio = (0.4 + (tier - 1) * 0.05) + (Math.random() + Math.random()) / 2 * (0.8 + (tier - 1) *
                        0.06);
                    r.score = clamp(Math.floor(base * ratio * rivalMul), Math.floor(maxPossible * 0.1), maxPossible);
                });
                let rivalStr = G.flags.rivals.map(r => r.name + ': ' + r.score + '分').join('\n');
                if (s > 0) { let em = getDiff().expMul || 1;
                    let mult = (G.flags.fortune === 'disaster' ? 1.7 : 1) * em;
                    let b = Math.min(60, Math.floor((Math.floor(s / 6) + 4) * mult));
                    updStat('代码力', b);
                    updStat('心态', Math.floor(b * 0.6));
                    addLog('📈比赛经验：代码力+' + b + ' 心态+' + Math.floor(b * 0.6)); }
                setTimeout(() => {
                    if (s <= 0) endGame(G.flags.curContest + '爆零，竞赛生涯提前结束');
                    else showScene(G.flags.curContest + '得分：' + s + '分\n\n对手成绩：\n' + rivalStr, [{ text: '继续',
                        action: () => next(s) }]);
                }, 1000);
            }

            function endGame(msg) {
                G.flags.stage = 'ending';
                G.flags.gameOver = true;
                G.flags.completed = true;
                if (G.flags.hiddenFlags.darkestMood <= 5) unlockHidden('至暗时刻');
                if (G.flags.hiddenFlags.luckyCount >= 3) unlockHidden('欧皇降临');
                if (G.flags.identity?.sp === 'last_dance' && G.flags.lastDanceTriggered && G.awards.some(a => a.includes(
                        '等奖') || a.includes('金牌'))) unlockHidden('燃烧殆尽');
                if (G.flags.identity?.id === '刷题机器' && G.flags.hiddenFlags.grinderClean <= 2) unlockHidden('冷酷机器');
                if (G.flags.hiddenFlags.社交高 && G.player.社交 > 80) unlockHidden('良师益友');
                if (G.flags.hiddenFlags.社交低 && G.awards.some(a => a.includes('等奖') || a.includes('金牌'))) unlockHidden(
                    '独行侠');
                let summary = msg + '\n\n📊最终属性：\n代码力' + G.player.代码力 + ' 心态' + G.player.心态 + ' 知识' + G.player.知识 +
                    ' 社交' + G.player.社交;
                summary += '\n\n🏅获得奖项：\n' + (G.awards.length ? G.awards.join('\n') : '无');
                summary += '\n✨隐藏成就：' + (G.hiddenAch.length ? G.hiddenAch.join(', ') : '无');
                showScene(summary, [{ text: '🏛️档案馆', action: () => showArchive() }, { text: '🏠主菜单', action: mainMenu }]);
            }

            // ========== 初始化 ==========
            function genStars() {
                let bg = document.getElementById('stars-bg');
                for (let i = 0; i < 30; i++) {
                    let s = document.createElement('div');
                    s.className = 'star';
                    s.style.left = Math.random() * 100 + '%';
                    s.style.top = Math.random() * 100 + '%';
                    s.style.width = s.style.height = Math.random() * 2 + 1 + 'px';
                    bg.appendChild(s);
                }
            }

            function init() {
                genStars();
                document.getElementById('mute-btn').addEventListener('click', function() { muted = !muted;
                    this.textContent = muted ? '🔇' : '🔊';
                    this.classList.toggle('muted', muted) });
                document.getElementById('volSlider').addEventListener('input', function(e) { volume = parseFloat(e
                        .target.value);
                    document.getElementById('volVal').textContent = Math.round(volume * 100) + '%' });
                updateDisplay();
                addLog('欢迎，OIer。');
                mainMenu();
            }
            if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
            else init();
        })();
    </script>
</body>
</html>
